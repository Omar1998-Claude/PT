<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Portfolio Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Georgia',serif;min-height:100vh;padding-bottom:100px;transition:background 0.4s,color 0.4s;overflow-x:hidden;position:relative;}
.app-bg{position:fixed;inset:0;z-index:-1;pointer-events:none;transition:background 0.5s;}
.dark .app-bg{background:linear-gradient(160deg,#0a0a18 0%,#070a16 50%,#05060f 100%);}
.light .app-bg{background:linear-gradient(160deg,#eef1ff 0%,#f3f0ff 50%,#ecfdf8 100%);}
.app-bg{overflow:hidden;}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(60px);will-change:transform,opacity;}
.dark .aurora-blob{opacity:0.8;}
.light .aurora-blob{opacity:0.55;}
.light .ab1{background:#8b5cf6;}
.ab1{width:60vw;height:60vw;background:#8b5cf6;top:-18vw;left:-12vw;animation:float1 10s ease-in-out infinite;}
.ab2{width:55vw;height:55vw;background:#38bdf8;top:-12vw;right:-14vw;animation:float2 12s ease-in-out infinite;}
.ab3{width:55vw;height:55vw;background:#2dd4bf;bottom:-18vw;right:-10vw;animation:float3 11s ease-in-out infinite;}
.ab4{width:52vw;height:52vw;background:#a855f7;bottom:-14vw;left:-14vw;animation:float4 13s ease-in-out infinite;}
.ab5{width:50vw;height:50vw;background:#fb923c;top:28vw;left:28vw;animation:float5 14s ease-in-out infinite;display:none;}
.light .ab5{display:block;}
@keyframes float5{0%,100%{transform:translate(0,0) scale(1);opacity:0.55;}33%{transform:translate(-22vw,-14vw) scale(1.28);opacity:0.7;}66%{transform:translate(18vw,16vw) scale(0.85);opacity:0.4;}}
@keyframes float1{0%,100%{transform:translate(0,0) scale(1);opacity:0.8;}33%{transform:translate(28vw,18vw) scale(1.3);opacity:0.95;}66%{transform:translate(14vw,34vw) scale(0.85);opacity:0.65;}}
@keyframes float2{0%,100%{transform:translate(0,0) scale(1);opacity:0.8;}33%{transform:translate(-24vw,22vw) scale(0.82);opacity:0.65;}66%{transform:translate(-34vw,10vw) scale(1.32);opacity:0.95;}}
@keyframes float3{0%,100%{transform:translate(0,0) scale(1);opacity:0.8;}33%{transform:translate(-20vw,-26vw) scale(1.28);opacity:0.95;}66%{transform:translate(-32vw,-14vw) scale(0.86);opacity:0.65;}}
@keyframes float4{0%,100%{transform:translate(0,0) scale(1);opacity:0.8;}33%{transform:translate(30vw,-18vw) scale(0.84);opacity:0.65;}66%{transform:translate(18vw,-30vw) scale(1.3);opacity:0.95;}}
button{font-family:'Georgia',serif;cursor:pointer;transition:transform 0.12s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s,background 0.25s,border-color 0.25s,color 0.25s;}
button:active{transform:scale(0.93)!important;}
button:hover{filter:brightness(1.05);}
/* Snappy entrance springs */
@keyframes popIn{0%{opacity:0;transform:translateY(14px) scale(0.96);}60%{opacity:1;transform:translateY(-3px) scale(1.02);}100%{opacity:1;transform:translateY(0) scale(1);}}
@keyframes slideTab{0%{opacity:0;transform:translateX(18px) scale(0.99);}60%{transform:translateX(-3px) scale(1.005);}100%{opacity:1;transform:translateX(0) scale(1);}}
@keyframes barGrow{0%{transform:scaleX(0);}70%{transform:scaleX(1.04);}100%{transform:scaleX(1);}}
@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 0 transparent);}50%{filter:drop-shadow(0 0 6px currentColor);}}
@keyframes countPop{0%{transform:scale(1);}50%{transform:scale(1.06);}100%{transform:scale(1);}}
.page{animation:slideTab 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.page .card{animation:popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) backwards;}
.page .card:nth-child(1){animation-delay:0.02s;}
.page .card:nth-child(2){animation-delay:0.07s;}
.page .card:nth-child(3){animation-delay:0.12s;}
.page .card:nth-child(4){animation-delay:0.17s;}
.page .card:nth-child(5){animation-delay:0.22s;}
.page .card:nth-child(6){animation-delay:0.27s;}
.page .card:nth-child(7){animation-delay:0.32s;}
.page .card:nth-child(8){animation-delay:0.37s;}
.page .card:nth-child(9){animation-delay:0.42s;}
.page .card:nth-child(10){animation-delay:0.47s;}
.page .card:nth-child(11){animation-delay:0.52s;}
.count-up{display:inline-block;}
.count-pop{animation:countPop 0.5s cubic-bezier(0.34,1.56,0.64,1);}
/* bars that grow from left */
.anim-bar{transform-origin:left center;animation:barGrow 0.8s cubic-bezier(0.34,1.56,0.64,1);}
.tab-active-pulse{animation:countPop 0.35s cubic-bezier(0.34,1.56,0.64,1);}
.donut-seg{animation:donutDraw 0.9s cubic-bezier(0.4,0,0.2,1) backwards;animation-delay:var(--delay,0s);}
@keyframes donutDraw{from{stroke-dasharray:0 calc(var(--seg) + var(--gap));}to{stroke-dasharray:var(--seg) var(--gap);}}
.hchip{font-size:9px;font-weight:600;padding:3px 9px;border-radius:9px;letter-spacing:0.2px;white-space:nowrap;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) backwards;}
.hchip:nth-child(1){animation-delay:0.15s;}
.hchip:nth-child(2){animation-delay:0.22s;}
.hchip:nth-child(3){animation-delay:0.29s;}
.hchip:nth-child(4){animation-delay:0.36s;}
input{font-family:'Georgia',serif;outline:none;}

/* ── DARK ── */
.dark{background:#05080f;color:#e8eaf0;}
.dark body,body.dark{background:#05080f;}
.dark .surf{background:rgba(15,22,35,0.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.dark .surf2{background:#141e2e;}
.dark .surf3{background:#1a2640;}
.dark .bd{border-color:#1a2640;}
.dark .bd2{border-color:#243050;}
.dark .t1{color:#e8eaf0;}
.dark .t2{color:#8892aa;}
.dark .t3{color:#4a5568;}
.dark .hdr-bg{background:linear-gradient(160deg,rgba(18,28,56,0.72) 0%,rgba(7,10,22,0.55) 100%);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.dark .tab-bg{background:rgba(7,10,22,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.dark .inp-bg{background:#0c1420;color:#e8eaf0;border-color:#243050;}
.dark .glow-blue{box-shadow:0 0 20px #3b82f622;}
.dark .glow-green{box-shadow:0 0 20px #4ade8022;}

/* ── LIGHT ── */
.light{background:#f0f4ff;color:#0f172a;}
.light .surf{background:#ffffff;}
.light .surf2{background:#f8faff;}
.light .surf3{background:#eef2ff;}
.light .bd{border-color:#e2e8f8;}
.light .bd2{border-color:#c7d2f0;}
.light .t1{color:#0f172a;}
.light .t2{color:#475569;}
.light .t3{color:#94a3b8;}
.light .hdr-bg{background:linear-gradient(160deg,rgba(219,234,254,0.70) 0%,rgba(240,244,255,0.55) 100%);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.light .tab-bg{background:rgba(255,255,255,0.70);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.light .inp-bg{background:#f8faff;color:#0f172a;border-color:#c7d2f0;}
.light .glow-blue{box-shadow:0 2px 16px #3b82f618;}
.light .glow-green{box-shadow:0 2px 16px #4ade8018;}

/* ── LAYOUT ── */
.sticky-hdr{position:sticky;top:0;z-index:20;border-bottom:1px solid;}
.sticky-tabs{position:sticky;top:160px;z-index:19;display:flex;border-bottom:1px solid;}
.tab-btn{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:#4a5568;transition:all 0.2s;}
.tab-btn.active{border-bottom-color:#6366f1;color:#6366f1!important;}
.page{padding:16px 14px;}

/* ── CARDS ── */
.card{border-radius:18px;padding:15px;margin-bottom:10px;border:1px solid;transition:all 0.3s;}
.card-sm{border-radius:12px;padding:10px 12px;border:1px solid;}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:8px;letter-spacing:0.5px;}

/* ── GOAL BAR ── */
.goal-track{height:12px;border-radius:8px;overflow:hidden;}
.dark .goal-track{background:#1a2640;}
.light .goal-track{background:#e2e8f8;}
.goal-fill{height:100%;border-radius:8px;transition:width 1s cubic-bezier(.4,0,.2,1);}

/* ── INJECT BTN ── */
.inj-btn{width:100%;padding:17px;border-radius:18px;font-size:13px;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;font-family:'Georgia',serif;transition:all 0.4s;}

/* ── ANIMATIONS ── */
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.shimmer{background:linear-gradient(90deg,#4ade80,#a3e635,#4ade80);background-size:200% auto;animation:shimmer 3s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.float{animation:float 3s ease-in-out infinite;}
.pulse{animation:pulse 2s ease-in-out infinite;}
.slide-in{animation:slideIn 0.3s ease forwards;}

/* ── SPARKLINE ── */
.spark-bar{display:inline-block;width:4px;border-radius:2px;margin-right:1px;vertical-align:bottom;transition:height 0.5s ease;}

.stock-link{cursor:pointer;transition:all 0.2s;}
.stock-link:hover{transform:scale(1.01);}
</style>
</head>
<body class="dark" id="app">
<div class="app-bg"><div class="aurora-blob ab1"></div><div class="aurora-blob ab2"></div><div class="aurora-blob ab3"></div><div class="aurora-blob ab4"></div><div class="aurora-blob ab5"></div></div>
<div id="root"></div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────
const CORE=["NVDA","TSLA","DELL","IBM","SNDK"];
const ANCHORS=["ABBV","XOM","JPM"];
const ALL_ACTIVE=[...CORE,...ANCHORS];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const BUDGETS=[200,300,400,500];

// Annual dividend yield % per share (approximate 2026)
const DIVIDENDS={IBM:2.5,ABBV:3.4,XOM:3.5,JPM:2.2,NVDA:0.03,TSLA:0,DELL:0,SNDK:0,NFLX:0,LCID:0};

// Annual goals milestones
const GOALS=[
  {year:2026,amount:5000,emoji:"🎯"},
  {year:2027,amount:15000,emoji:"🚀"},
  {year:2028,amount:35000,emoji:"🌟"},
];

// Quarterly review questions
const QUARTERLY_CHECKS=[
  "Is AI infrastructure demand still growing? (impacts NVDA, DELL, SNDK)",
  "Are your anchors still paying dividends? (ABBV, XOM, JPM)",
  "Has any stock become >35% of portfolio? (concentration risk)",
  "Did any holding miss earnings 2+ quarters in a row?",
  "Is your monthly injection on track to hit your annual goal?",
  "Any macro risks? (rate hikes, oil price swings, tech regulation)",
];

const DEFAULT_HOLDINGS=[
  {ticker:"NVDA",name:"Nvidia",        value:224.14,basePct:0.20,target:25,color:"#a3e635",anchor:false,tip:"AI chip leader — your highest conviction pick"},
  {ticker:"TSLA",name:"Tesla",         value:194.97,basePct:0.13,target:13,color:"#f87171",anchor:false,tip:"EV & energy — volatile but high upside"},
  {ticker:"DELL",name:"Dell",          value:0,     basePct:0.24,target:20,color:"#60a5fa",anchor:false,tip:"AI server infrastructure — explosive recent growth"},
  {ticker:"IBM", name:"IBM",           value:0,     basePct:0.18,target:17,color:"#818cf8",anchor:false,tip:"Stable tech — your ballast. Pays ~2.5% dividend"},
  {ticker:"SNDK",name:"SanDisk",       value:0,     basePct:0.10,target:10,color:"#fb923c",anchor:false,tip:"NAND memory — high risk, high reward AI play"},
  {ticker:"ABBV",name:"AbbVie",        value:0,     basePct:0.15,target:8, color:"#34d399",anchor:true, tip:"Pharma anchor — 3.4% dividend, recession-proof"},
  {ticker:"XOM", name:"ExxonMobil",    value:0,     basePct:0.10,target:5, color:"#fbbf24",anchor:true, tip:"Energy anchor — 3.5% dividend, 40+ years of growth"},
  {ticker:"JPM", name:"JPMorgan Chase",value:0,     basePct:0.10,target:2, color:"#38bdf8",anchor:true, tip:"Financial anchor — 2.2% dividend, largest US bank"},
  {ticker:"NFLX",name:"Netflix",       value:6.80,  basePct:0,   target:0, color:"#ef4444",anchor:false,tip:"Small position — consider adding or consolidating"},
  {ticker:"LCID",name:"Lucid",         value:0.61,  basePct:0,   target:0, color:"#c084fc",anchor:false,tip:"Down 78% — consider selling. Loss offsets capital gains tax"},
];

// ── STATE ─────────────────────────────────────────────────
let S={
  holdings:JSON.parse(localStorage.getItem("pt_h")||"null")||DEFAULT_HOLDINGS,
  history: JSON.parse(localStorage.getItem("pt_his")||"[]"),
  dark:    localStorage.getItem("pt_dk")!=="false",
  mode:    localStorage.getItem("pt_mode")||"rotation",
  winner:"DELL",budget:500,
  tab:(function(){var v=(new URLSearchParams(window.location.search)).get("tab");return ["dashboard","inject","dividends","goals","review","history"].indexOf(v)>-1?v:"dashboard";})(),
  editIdx:null,editVal:"",
  injected:false,expandedTip:null,
  month:new Date().getMonth(),year:new Date().getFullYear(),
  qChecks:{}, // quarterly check answers
  divReinvest:true,
};
function save(){
  localStorage.setItem("pt_h",JSON.stringify(S.holdings));
  localStorage.setItem("pt_his",JSON.stringify(S.history));
  localStorage.setItem("pt_dk",S.dark);
  localStorage.setItem("pt_mode",S.mode);
}

// ── UTILS ─────────────────────────────────────────────────
const fmt=n=>"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK=n=>n>=1000?"$"+(n/1000).toFixed(1)+"k":fmt(n);

function getRotDist(h,w,b){
  const d={};ALL_ACTIVE.forEach(t=>{const x=h.find(v=>v.ticker===t);d[t]=Math.round(x.basePct*b);});
  const tot=Object.values(d).reduce((s,v)=>s+v,0);d["NVDA"]+=(b-tot);
  if(w&&CORE.includes(w)&&w!=="IBM"){
    const mn=Math.round(b*0.08),nw=Math.max(mn,d["IBM"]-Math.round(b*0.18)),ex=d["IBM"]-nw;
    d["IBM"]=nw;d[w]=(d[w]||0)+ex;
  }return d;
}
function getIdxDist(h,b){
  const tot=h.reduce((s,x)=>s+x.value,0)+b;
  const uw=ALL_ACTIVE.map(t=>{const x=h.find(v=>v.ticker===t);const c=tot>0?(x.value/tot)*100:0;return{ticker:t,gap:Math.max(0,x.target-c)};}).filter(x=>x.gap>0);
  const tg=uw.reduce((s,x)=>s+x.gap,0);const d={};ALL_ACTIVE.forEach(t=>d[t]=0);
  uw.forEach(x=>{d[x.ticker]=Math.round((x.gap/tg)*b);});
  const dt=Object.values(d).reduce((s,v)=>s+v,0);if(uw.length>0)d[uw[0].ticker]+=(b-dt);
  const sc=ALL_ACTIVE.map(t=>{const x=h.find(v=>v.ticker===t);const c=tot>0?(x.value/tot)*100:0;return{ticker:t,gap:x.target-c};}).sort((a,b)=>b.gap-a.gap);
  return{dist:d,top:sc[0].ticker,scores:sc};
}

// Annual dividend income
function annualDividends(holdings){
  return holdings.reduce((s,h)=>{const y=DIVIDENDS[h.ticker]||0;return s+(h.value*y/100);},0);
}

// Donut SVG
function donut(holdings,total,size,dark){
  const active=holdings.filter(h=>h.value>0);
  const bg=dark?"#1a2640":"#e2e8f8";
  const r=size*0.37,cx=size/2,cy=size/2,c=2*Math.PI*r;
  if(!active.length||!total)return`<svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${bg}" stroke-width="${size*0.14}"/></svg>`;
  let off=0,sl="",di=0;
  active.forEach(h=>{
    const d=(h.value/total)*c;
    sl+=`<circle class="donut-seg" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${h.color}" stroke-width="${size*0.14}" stroke-linecap="round" stroke-dasharray="${d} ${c-d}" stroke-dashoffset="${-off}" style="--seg:${d};--gap:${c-d};--delay:${(di*0.12).toFixed(2)}s;"/>`;
    off+=d;di++;
  });
  return`<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${bg}" stroke-width="${size*0.14}"/>${sl}</svg>`;
}

// Sparkline from history totals
function sparkline(history,color){
  if(history.length<2)return"";
  const vals=history.map(h=>h.total);
  const mx=Math.max(...vals),mn=Math.min(...vals),range=mx-mn||1;
  return vals.slice(-8).map(v=>{const h=Math.max(8,Math.round(((v-mn)/range)*28)+8);return`<span class="spark-bar" style="height:${h}px;background:${color};opacity:0.8;"></span>`;}).join("");
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  const {holdings,history,dark,mode,winner,budget,tab,editIdx,editVal,injected,expandedTip,month,year,qChecks}=S;
  document.getElementById("app").className=dark?"dark":"light";

  const tv=holdings.reduce((s,h)=>s+h.value,0);
  const techV=holdings.filter(h=>CORE.includes(h.ticker)).reduce((s,h)=>s+h.value,0);
  const anchV=holdings.filter(h=>ANCHORS.includes(h.ticker)).reduce((s,h)=>s+h.value,0);
  const invested=history.reduce((s,h)=>s+h.budget,0);
  const gl=tv-invested;
  const glPct=invested>0?((gl/invested)*100).toFixed(1):0;
  const annDiv=annualDividends(holdings);
  const rotD=getRotDist(holdings,winner,budget);
  const{dist:idxD,top:topT}=getIdxDist(holdings,budget);
  const actD=mode==="rotation"?rotD:idxD;
  const techPct=tv>0?(techV/tv*100).toFixed(0):0;
  const anchPct=tv>0?(anchV/tv*100).toFixed(0):0;

  // Current goal
  const now=new Date();
  const curGoal=GOALS.find(g=>g.year>=now.getFullYear())||GOALS[GOALS.length-1];
  const goalPct=Math.min((tv/curGoal.amount)*100,100);
  const rem=Math.max(curGoal.amount-tv,0);
  const mLeft=Math.max(0,Math.round((new Date(`${curGoal.year}-12-31`)-now)/(1000*60*60*24*30)));
  const mNeeded=mLeft>0?rem/mLeft:0;

  // ── HEADER ──────────────────────────────────────────────
  const segBar=holdings.filter(h=>h.value>0).map(h=>`<div style="width:${(h.value/tv*100).toFixed(1)}%;background:${h.color};height:100%;transition:width 0.7s ease;" title="${h.ticker}"></div>`).join("");

  const hdr=`
  <div class="sticky-hdr hdr-bg bd" style="padding:18px 16px 12px;">
    <div style="display:flex;align-items:flex-start;gap:13px;">
      <div style="position:relative;flex-shrink:0;">
        ${donut(holdings,tv,80,dark)}
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;">
          <div style="font-size:6px;letter-spacing:1px;" class="t3">TOTAL</div>
          <div style="font-size:9px;font-weight:bold;" class="t1">${fmtK(tv)}</div>
        </div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:22px;font-weight:bold;letter-spacing:-0.5px;line-height:1;" class="t1"><span class="count-up" data-count="${tv}" data-prefix="$" data-dec="2">${fmt(tv)}</span></div>
        ${invested>0?`<div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
          <span style="background:${gl>=0?"#4ade8022":"#f8717122"};color:${gl>=0?"#4ade80":"#f87171"};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:bold;">${gl>=0?"▲":"▼"} ${glPct}%</span>
          <span style="font-size:10px;" class="t3">${fmt(Math.abs(gl))} ${gl>=0?"gain":"loss"}</span>
        </div>`:""}
        <div style="display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;">
          <span class="hchip" style="background:#a3e63516;border:1px solid #a3e63538;color:${dark?"#a3e635":"#5a8a00"};">💻 Tech ${techPct}%</span>
          <span class="hchip" style="background:#34d39916;border:1px solid #34d39938;color:${dark?"#34d399":"#0f8a5f"};">⚓ Anchors ${anchPct}%</span>
          <span class="hchip" style="background:${goalPct>=100?"#4ade8016":"#6366f116"};border:1px solid ${goalPct>=100?"#4ade8038":"#6366f138"};color:${goalPct>=100?(dark?"#4ade80":"#16a34a"):(dark?"#818cf8":"#4f46e5")};">${curGoal.emoji} Goal ${goalPct.toFixed(0)}%</span>
          ${annDiv>0?`<span class="hchip" style="background:#fbbf2416;border:1px solid #fbbf2438;color:${dark?"#fbbf24":"#b45309"};">💰 ${fmt(annDiv)}/yr</span>`:""}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <button onclick="S.dark=!S.dark;save();render();" style="background:${dark?"#141e2e":"#eef2ff"};border:1px solid ${dark?"#243050":"#c7d2f0"};border-radius:20px;padding:5px 11px;font-size:11px;" class="t2">${dark?"☀️":"🌙"}</button>

  // ══════════════════════════════════════════════════════

  const qScore=QUARTERLY_CHECKS.filter((_,i)=>qChecks[i]==="yes").length;

    <button onclick="S.qChecks={};render();" style="width:100%;margin-top:12px;padding:12px;border-radius:12px;border:1px solid ${dark?"#1a2640":"#e2e8f8"};background:transparent;color:${dark?"#4a5568":"#94a3b8"};font-size:11px;">Reset Review</button>
  </div>`;

  // ══════════════════════════════════════════════════════
  // ── HISTORY TAB ──────────────────────────────────────
  const historyHtml=history.length===0?`
  <div style="text-align:center;padding:60px 16px;" class="slide-in">
    <div style="font-size:52px;margin-bottom:14px;">📭</div>
    <div style="font-size:14px;font-weight:bold;" class="t2">No injections yet</div>
    <div style="font-size:11px;margin-top:5px;" class="t3">Tap 💉 Inject to make your first move</div>
  </div>`:`
  <div class="slide-in">
    <div style="background:${gl>=0?(dark?"linear-gradient(135deg,#052e16,#07381c)":"#f0fdf4"):(dark?"linear-gradient(135deg,#2a0a0a,#3a1010)":"#fef2f2")};border:1px solid ${gl>=0?"#4ade8044":"#f8717144"};border-left:3px solid ${gl>=0?"#4ade80":"#f87171"};border-radius:12px;padding:11px 13px;margin-bottom:14px;font-size:11px;line-height:1.65;" class="t2">
      ${gl>=0?"🚀":"💪"} ${gl>=0?`Up ${glPct}% (${fmt(gl)}) on ${fmt(invested)} invested over ${history.length} month${history.length>1?"s":""}. Keep going!`:`Down ${fmt(Math.abs(gl))} over ${history.length} months. Stay the course — time in market wins.`}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px;">
      ${[["Invested",fmt(invested),"#6366f1"],["Value",fmt(tv),gl>=0?"#4ade80":"#f87171"],["Months",history.length,"#fb923c"]].map(([l,v,c])=>`
        <div class="card surf" style="border:1px solid ${c}33;padding:12px 6px;text-align:center;">
          <div style="font-size:14px;font-weight:bold;color:${c};">${v}</div>
          <div style="font-size:7px;letter-spacing:1px;text-transform:uppercase;margin-top:3px;" class="t3">${l}</div>

        ${(()=>{const mx=Math.max(...history.map(x=>x.total));return history.map(h=>`

// ── COUNT-UP ANIMATION ────────────────────────────────────
function runCountUps(){
  var els=document.querySelectorAll(".count-up");
  els.forEach(function(el){
    var target=parseFloat(el.getAttribute("data-count"))||0;
    var prefix=el.getAttribute("data-prefix")||"";
    var dec=parseInt(el.getAttribute("data-dec")||"0",10);
    var dur=650, start=null, from=0;
    function fmtNum(n){return prefix+Number(n).toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec});}
    if(target===0){el.textContent=fmtNum(0);return;}
    function step(ts){
      if(!start)start=ts;
      var p=Math.min((ts-start)/dur,1);
      // easeOutBack-ish for a snappy overshoot then settle
      var eased=1-Math.pow(1-p,3);
      el.textContent=fmtNum(from+(target-from)*eased);
      if(p<1){requestAnimationFrame(step);}
      else{el.textContent=fmtNum(target);el.classList.add("count-pop");setTimeout(function(){el.classList.remove("count-pop");},500);}
    }
    requestAnimationFrame(step);
  });
}

// ── ACTIONS ───────────────────────────────────────────────
function doEdit(i){S.editIdx=i;S.editVal=S.holdings[i].value.toFixed(2);render();}
function doSave(i){const v=parseFloat(S.editVal);if(!isNaN(v)&&v>=0)S.holdings[i].value=v;S.editIdx=null;save();render();}

function doInject(){
  const{holdings,mode,winner,budget,month,year}=S;
  const{dist:id,top}=getIdxDist(holdings,budget);
  const rd=getRotDist(holdings,winner,budget);
  const ad=mode==="rotation"?rd:id;
  S.holdings=holdings.map(h=>({...h,value:h.value+(ad[h.ticker]||0)}));
  S.history=[...S.history,{month:MONTHS[month],year,mode,budget,winner:mode==="rotation"?winner:top,dist:{...ad},total:S.holdings.reduce((s,h)=>s+h.value,0)}];
  if(month===11){S.month=0;S.year++;}else S.month++;
  S.injected=true;save();render();
  setTimeout(()=>{S.injected=false;render();},2500);
}

render();
</script>
