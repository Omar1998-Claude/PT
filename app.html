<html lang="en">

<title>The Terminal — Portfolio Times</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --paper:#f3ece0; --ink:#1c1814; --vermillion:#c4361a; --vermillion-soft:#d6492c;
  --gold:#b08428; --green:#2f7d52; --muted:#8a7f6e; --rule:#d8cdbb;
  --surf:#fbf6ec; --surf-line:#e4d9c7;
}
.dark{
  --paper:#0f0c0a; --ink:#ece3d2; --vermillion:#e0532f; --vermillion-soft:#c4361a;
  --gold:#d9a943; --green:#5cb381; --muted:#8a7e6c; --rule:#2a2018;
  --surf:#171210; --surf-line:#2a2018;
}
body{font-family:'Iowan Old Style','Palatino Linotype','Georgia',serif;min-height:100vh;background:var(--paper);color:var(--ink);padding-bottom:90px;transition:background 0.4s,color 0.4s;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.wash{position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(120% 80% at 80% -10%, rgba(196,54,26,0.10), transparent 55%),
             radial-gradient(90% 60% at -10% 110%, rgba(176,132,40,0.08), transparent 55%);}
.dark .wash{background:radial-gradient(120% 80% at 80% -10%, rgba(224,83,47,0.12), transparent 55%),
             radial-gradient(90% 60% at -10% 110%, rgba(217,169,67,0.07), transparent 55%);}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;transition:transform 0.12s ease,opacity 0.2s,background 0.2s,color 0.2s,border-color 0.2s;}
button:active{transform:scale(0.97);}
input{font-family:inherit;outline:none;}
.paper-link{display:flex;align-items:center;gap:9px;padding:10px 18px;text-decoration:none;background:var(--ink);}
.paper-link .plm{color:var(--vermillion);font-size:11px;}
.paper-link .pln{font-weight:700;font-style:italic;font-size:13px;color:var(--paper);letter-spacing:-0.2px;}
.paper-link .pls{color:var(--muted);font-size:10px;}
.paper-link .plt{font-family:'Courier New',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--vermillion);border:1px solid var(--vermillion);padding:1px 6px;border-radius:2px;opacity:0.8;}
.paper-link .plb{margin-left:auto;font-family:'Courier New',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.overview{padding:26px 22px 22px;text-align:center;position:relative;}
.ov-kicker{font-family:'Courier New',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.ov-total{font-size:46px;font-weight:400;letter-spacing:-1.5px;line-height:1;}
.ov-total .cents{font-size:24px;color:var(--muted);}
.ov-sub{margin-top:12px;font-size:13px;color:var(--muted);font-style:italic;}
.ov-sub .pos{color:var(--green);font-style:normal;}
.ov-sub .neg{color:var(--vermillion);font-style:normal;}
.ov-rule{height:1px;background:var(--rule);margin:20px 30px 0;}
.ov-stats{display:flex;justify-content:center;gap:0;}
.ov-stat{flex:1;padding:16px 4px 4px;text-align:center;position:relative;}
.ov-stat + .ov-stat::before{content:"";position:absolute;left:0;top:18px;bottom:6px;width:1px;background:var(--rule);}
.ov-stat .v{font-size:18px;font-weight:600;}
.ov-stat .l{font-family:'Courier New',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.ed-toggle{position:absolute;top:20px;right:18px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border:1px solid var(--rule);border-radius:20px;padding:5px 11px;background:var(--surf);}
.thread{display:flex;height:5px;border-radius:3px;overflow:hidden;margin:18px 22px 0;gap:1px;}
.thread > div{height:100%;}
.tabs{position:sticky;top:0;z-index:20;display:flex;background:var(--paper);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);}

.tab.on{color:var(--vermillion);border-bottom-color:var(--vermillion);}
.page{padding:20px 18px;animation:fade 0.35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.sec{font-family:'Courier New',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin:4px 2px 12px;}
.hrow{border-bottom:1px solid var(--surf-line);padding:14px 2px;cursor:pointer;}
.hrow:last-child{border-bottom:none;}
.hrow-top{display:flex;align-items:center;gap:12px;}
.hrow-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.hrow-tk{font-size:16px;font-weight:600;letter-spacing:-0.2px;min-width:54px;}

.hrow-val{font-size:16px;font-weight:600;text-align:right;}
.hrow-pct{font-size:10px;color:var(--muted);text-align:right;margin-top:1px;}
.hrow-bar{height:3px;border-radius:2px;overflow:hidden;background:var(--surf-line);margin-top:9px;position:relative;}
.hrow-bar > i{display:block;height:100%;border-radius:2px;}

.anchor-mark{font-size:9px;color:var(--green);}
.warn-mark{font-size:9px;color:var(--vermillion);}
.hdetail{margin-top:12px;padding:13px;background:var(--surf);border-radius:10px;border:1px solid var(--surf-line);}
.hdetail .tip{font-size:12px;line-height:1.6;color:var(--ink);opacity:0.85;}
.hdetail .acts{display:flex;gap:8px;margin-top:12px;}

.hdetail input{flex:1;padding:9px;border-radius:8px;border:1px solid var(--rule);background:var(--paper);color:var(--ink);font-size:14px;}
.hdetail .save{padding:9px 16px;border-radius:8px;background:var(--vermillion);color:#fff;font-weight:600;font-size:13px;}
.card{background:var(--surf);border:1px solid var(--surf-line);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-q{font-size:11px;letter-spacing:0.5px;text-transform:uppercase;font-family:'Courier New',monospace;color:var(--muted);margin-bottom:10px;}
.seg{display:flex;background:var(--surf);border:1px solid var(--rule);border-radius:10px;overflow:hidden;}
.seg button{flex:1;padding:10px;font-size:11px;letter-spacing:0.5px;color:var(--muted);}
.seg button.on{background:var(--ink);color:var(--paper);}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{padding:9px 12px;border-radius:10px;border:1px solid var(--rule);background:var(--surf);font-size:13px;color:var(--muted);flex:1;text-align:center;}
.chip.on{border-color:var(--vermillion);color:var(--vermillion);background:transparent;}
.btn{width:100%;padding:15px;border-radius:12px;font-size:13px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.btn-primary{background:var(--vermillion);color:#fff;}
.btn-primary.done{background:var(--green);}
.btn-ghost{background:var(--surf);border:1px solid var(--rule);color:var(--muted);font-size:11px;letter-spacing:1px;}
.goaltrack{height:8px;border-radius:6px;background:var(--surf-line);overflow:hidden;}
.goalfill{height:100%;border-radius:6px;transition:width 1s cubic-bezier(.4,0,.2,1);}
.brk{margin-bottom:11px;}
.brk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.brk-l{display:flex;align-items:center;gap:7px;font-size:13px;}
.brk-bar{height:7px;border-radius:5px;overflow:hidden;background:var(--surf-line);}
.brk-bar > i{display:block;height:100%;border-radius:5px;transition:width 0.6s ease;}
.muted{color:var(--muted);}
.count-up{display:inline-block;}
</style>

const BUDGETS=[200,300,400,500];
const DIVIDENDS={IBM:2.5,ABBV:3.4,XOM:3.5,PG:2.9,NVDA:0.03,TSLA:0,DELL:1.8,SNDK:0,NFLX:0,LCID:0,JTEK:0.3,GOOGL:0.5,RIO:3.8};
const GOALS=[{year:2026,amount:5000,emoji:"🎯"},{year:2027,amount:15000,emoji:"🚀"},{year:2028,amount:35000,emoji:"🌟"}];

  {ticker:"NFLX",name:"Netflix",       value:6.36,  basePct:0,   target:0, color:"#e50914",anchor:false,tip:"Small position — consider adding or consolidating."},
  {ticker:"LCID",name:"Lucid",         value:0.47,  basePct:0,   target:0, color:"#c084fc",anchor:false,tip:"Down ~80% — consider selling. Loss offsets capital gains tax."},
  {ticker:"PG",  name:"Procter & Gamble",value:0,   basePct:0.14,target:14, color:"#2563eb",anchor:true, tip:"Recession-proof anchor — people buy P&G staples in any economy. 2.9% dividend, 70 straight years of raises."},
  {ticker:"GOLD",name:"Gold (Physical)",  value:295.50,basePct:0,target:0,color:"#d4af37",anchor:false,satellite:true,tip:"🥇 PHYSICAL METALS — $150/mo DCA. Hedge against inflation, currency risk & geopolitical uncertainty. Uncorrelated with stocks. Buy & hold long-term, don't trade it."},
  {ticker:"SILV",name:"Silver (Physical)", value:295.50,basePct:0,target:0,color:"#c0c0c0",anchor:false,satellite:true,tip:"🪙 PHYSICAL METALS — $150/mo DCA. Industrial demand (solar, EVs, AI electronics) + monetary hedge. More volatile than gold but higher upside. Buy & hold."},

let S={
  holdings:JSON.parse(localStorage.getItem("pt_h7")||"null")||DEFAULT_HOLDINGS,
  history: JSON.parse(localStorage.getItem("pt_his")||"[]"),
  dark:    localStorage.getItem("pt_dk")!=="false",
  mode:    localStorage.getItem("pt_mode")||"rotation",
  winner:"DELL",budget:500,
  tab:(function(){var v=(new URLSearchParams(window.location.search)).get("tab");
       var map={dashboard:"portfolio",dividends:"portfolio",inject:"invest",goals:"goals",review:"goals",history:"goals"};
       return map[v]|| (["portfolio","invest","goals"].indexOf(v)>-1?v:"portfolio");})(),
  expanded:null, editIdx:null, editVal:"",
  injected:false,
  month:new Date().getMonth(),year:new Date().getFullYear(),
  deposited:parseFloat(localStorage.getItem("pt_dep")||"0")||0,
  editDep:false, depVal:"",
  adding:false, addTk:"", addNm:"", addVal:"", addAnchor:false,
  prices:{}, pricesStatus:"idle", // live price cache
  qChecks:{}, goalSub:"track", projRate:300,
};
function save(){
  localStorage.setItem("pt_h7",JSON.stringify(S.holdings));
  localStorage.setItem("pt_his",JSON.stringify(S.history));

}
function exportHoldings(){
  var today=new Date().toISOString().slice(0,10);
  var obj={_comment:"SINGLE SOURCE OF TRUTH. Edit values here once and all pages read from it. 'value' = cost basis (amount invested).",
    updated:today,goal:5000,
    holdings:S.holdings.map(function(h){return {ticker:h.ticker,name:h.name,value:h.value,target:h.target,anchor:!!h.anchor,color:h.color};})};
  var txt=JSON.stringify(obj,null,2);

  function ok(){if(msg){msg.style.color="var(--green)";msg.textContent="✓ Copied — now paste into holdings.json on GitHub.";}}
  function fail(){if(msg){msg.style.color="var(--gold)";msg.textContent="Couldn't auto-copy — long-press to select below:";}
    var ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="width:100%;height:120px;margin-top:8px;font-size:10px;font-family:monospace;";msg.parentNode.appendChild(ta);ta.focus();ta.select();}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(ok).catch(fail);}else{fail();}
}
const fmt=n=>"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt0=n=>"$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:0});
const fmtK=n=>n>=1000?"$"+(n/1000).toFixed(1)+"k":fmt0(n);
function getRotDist(h,w,b){
  // 1) Base split across the plan by each stock's target weight
  const wsum=ALL_ACTIVE.reduce((s,t)=>{const x=h.find(v=>v.ticker===t);return s+(x.target||0);},0);
  let base={};
  ALL_ACTIVE.forEach(t=>{const x=h.find(v=>v.ticker===t);base[t]=wsum>0?(x.target||0)/wsum*b:b/ALL_ACTIVE.length;});
  // 2) Winner boost: move ~30% of the budget toward the winner, pulled proportionally from the rest
  if(w&&ALL_ACTIVE.includes(w)){
    const boost=b*0.30;
    const others=ALL_ACTIVE.filter(t=>t!==w);
    const otherTotal=others.reduce((s,t)=>s+base[t],0);
    others.forEach(t=>{ if(otherTotal>0) base[t]-=boost*(base[t]/otherTotal); });
    base[w]+=boost;
  }
  // 3) Round to whole dollars, then fix any rounding drift on the winner (or first stock)
  const d={};ALL_ACTIVE.forEach(t=>{d[t]=Math.max(0,Math.round(base[t]));});
  const drift=b-Object.values(d).reduce((s,v)=>s+v,0);
  const fixOn=(w&&ALL_ACTIVE.includes(w))?w:ALL_ACTIVE[0];
  d[fixOn]=Math.max(0,d[fixOn]+drift);
  return d;
}
function getIdxDist(h,b){
  const tot=h.reduce((s,x)=>s+x.value,0)+b;
  const uw=ALL_ACTIVE.map(t=>{const x=h.find(v=>v.ticker===t);const c=tot>0?(x.value/tot)*100:0;return{ticker:t,gap:Math.max(0,x.target-c)};}).filter(x=>x.gap>0);
  const tg=uw.reduce((s,x)=>s+x.gap,0);const d={};ALL_ACTIVE.forEach(t=>d[t]=0);
  uw.forEach(x=>{d[x.ticker]=Math.round((x.gap/tg)*b);});
  const dt=Object.values(d).reduce((s,v)=>s+v,0);if(uw.length>0)d[uw[0].ticker]+=(b-dt);
  const sc=ALL_ACTIVE.map(t=>{const x=h.find(v=>v.ticker===t);const c=tot>0?(x.value/tot)*100:0;return{ticker:t,gap:x.target-c};}).sort((a,b)=>b.gap-a.gap);
  return{dist:d,top:sc[0].ticker,scores:sc};
}
function annualDividends(holdings){return holdings.reduce((s,h)=>{const y=DIVIDENDS[h.ticker]||0;return s+(h.value*y/100);},0);}

// ── #5 LIVE PRICES (Yahoo via CORS proxy, same pattern as ledger/stock pages) ──
function fetchQuote(ticker, cb){
  var base="https://query1.finance.yahoo.com/v8/finance/chart/"+ticker+"?range=1d&interval=1d";
  var proxies=["https://corsproxy.io/?"+encodeURIComponent(base),"https://api.allorigins.win/raw?url="+encodeURIComponent(base)];
  var idx=0;
  function tryNext(){
    if(idx>=proxies.length){cb(null);return;}
    var xhr=new XMLHttpRequest();xhr.open("GET",proxies[idx++],true);xhr.timeout=8000;
    xhr.onload=function(){
      if(xhr.status===200){try{
        var d=JSON.parse(xhr.responseText);
        var m=d&&d.chart&&d.chart.result&&d.chart.result[0]&&d.chart.result[0].meta;
        if(m&&m.regularMarketPrice!=null){
          var prev=(m.chartPreviousClose!=null?m.chartPreviousClose:m.previousClose);
          var pct=(prev&&prev!==0)?((m.regularMarketPrice-prev)/prev)*100:0;
          cb({price:m.regularMarketPrice,pct:pct});return;
        }
      }catch(e){}}
      tryNext();
    };
    xhr.onerror=function(){tryNext();};xhr.ontimeout=function(){tryNext();};xhr.send();
  }
  tryNext();
}
function loadPrices(){
  if(S.pricesStatus==="loading")return;
  S.pricesStatus="loading";
  var held=S.holdings.filter(function(h){return h.value>0;}).map(function(h){return h.ticker;});
  var done=0, any=false;
  if(!held.length){S.pricesStatus="idle";return;}
  held.forEach(function(tk){
    fetchQuote(tk,function(q){
      done++;
      if(q){S.prices[tk]={price:q.price,pct:q.pct};any=true;}
      if(done===held.length){S.pricesStatus=any?"live":"failed";render();}
    });
  });
}

function render(){
  const {holdings,history,dark,mode,winner,budget,tab,expanded,editIdx,editVal,injected,month,year,qChecks,goalSub}=S;
  document.getElementById("app").className=dark?"dark":"light";
  const tv=holdings.reduce((s,h)=>s+h.value,0);
  const coreTv=holdings.filter(h=>!h.satellite).reduce((s,h)=>s+h.value,0);
  const techV=holdings.filter(h=>CORE.includes(h.ticker)).reduce((s,h)=>s+h.value,0);
  const anchV=holdings.filter(h=>ANCHORS.includes(h.ticker)).reduce((s,h)=>s+h.value,0);
  const metalsV=holdings.filter(h=>h.ticker==="GOLD"||h.ticker==="SILV").reduce((s,h)=>s+h.value,0);
  const invested=S.deposited>0?S.deposited:history.reduce((s,h)=>s+h.budget,0);
  const gl=tv-invested, glPct=invested>0?((gl/invested)*100).toFixed(1):0;
  const annDiv=annualDividends(holdings);
  const techPct=coreTv>0?(techV/coreTv*100).toFixed(0):0, anchPct=coreTv>0?(anchV/coreTv*100).toFixed(0):0;
  const now=new Date();
  const curGoal=GOALS.find(g=>g.year>=now.getFullYear())||GOALS[GOALS.length-1];
  const goalPct=Math.min((tv/curGoal.amount)*100,100);

  const dollars=Math.floor(tv), cents=Math.round((tv-dollars)*100).toString().padStart(2,"0");
  const threadBar=holdings.filter(h=>h.value>0).sort((a,b)=>b.value-a.value)
    .map(h=>`<div style="width:${(h.value/tv*100).toFixed(2)}%;background:${h.color};" title="${h.ticker}"></div>`).join("");

  // ── #6 Insight nudge: read allocation, surface one useful observation ──
  const insight=(function(){
    const techN=parseFloat(techPct), anchN=parseFloat(anchPct);
    const emptyAnchors=ANCHORS.filter(t=>{const x=holdings.find(v=>v.ticker===t);return x&&x.value<=0;});

      if(!movers.length)return `<div class="card" style="text-align:center;color:var(--muted);font-size:12px;">Live prices load when you open the app online.</div>`;
      return movers.map(m=>`<div class="card" style="padding:11px 15px;display:flex;justify-content:space-between;align-items:center;">
        <span style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;"><span class="hrow-dot" style="background:${m.color};"></span>${m.tk}</span>
        <span style="font-size:13px;">$${m.price.toFixed(2)} <span style="color:${m.pct>=0?'var(--green)':'var(--vermillion)'};font-size:11px;">${m.pct>=0?'▲':'▼'}${Math.abs(m.pct).toFixed(2)}%</span></span>
      </div>`).join("");
    })()}`;

  const goals=`
  <div class="page">
    <div class="seg" style="margin-bottom:20px;">
      <button class="${goalSub==="track"?"on":""}" onclick="S.goalSub='track';render();">Track</button>
      <button class="${goalSub==="review"?"on":""}" onclick="S.goalSub='review';render();">Review</button>
      <button class="${goalSub==="history"?"on":""}" onclick="S.goalSub='history';render();">Performance</button>
    </div>
    ${goalSub==="track"?goalsMain:goalSub==="review"?goalsReview:goalsHistory}
  </div>`;

  const pages={portfolio,invest,goals};
  document.getElementById("root").innerHTML=overview+tabsHtml+(pages[tab]||"");
  if(editIdx!==null){const ei=document.getElementById("ei");if(ei){ei.focus();}}
  runCountUps();
}
function isToggle(tk){return S.expanded===tk?null:tk;}
function runCountUps(){
  document.querySelectorAll(".count-up").forEach(function(el){
    var target=parseFloat(el.getAttribute("data-count"))||0,dur=600,start=null;
    if(target===0){el.textContent="0";return;}
    function step(ts){if(!start)start=ts;var p=Math.min((ts-start)/dur,1);var e=1-Math.pow(1-p,3);
      el.textContent=Math.round(target*e).toLocaleString("en-US");
      if(p<1)requestAnimationFrame(step);else el.textContent=target.toLocaleString("en-US");}
    requestAnimationFrame(step);
  });
}
function doEdit(i){S.editIdx=i;S.editVal=S.holdings[i].value.toFixed(2);render();}
function doSave(i){const v=parseFloat(S.editVal);if(!isNaN(v)&&v>=0)S.holdings[i].value=v;S.editIdx=null;save();render();}
function doAdd(i,amt){ // #7 quick-add money to a position
  const v=S.holdings[i].value+amt;S.holdings[i].value=Math.round(v*100)/100;S.editVal=S.holdings[i].value.toFixed(2);save();render();
}
function doSaveDep(){const v=parseFloat(S.depVal);if(!isNaN(v)&&v>=0)S.deposited=v;S.editDep=false;save();render();}
function doAddSave(){ // #4 add a stock — inline, no browser pop-ups
  var tk=(S.addTk||"").trim().toUpperCase();
  var msg=document.getElementById("addMsg");
  if(!tk){if(msg)msg.textContent="Enter a ticker symbol.";return;}
  if(S.holdings.find(h=>h.ticker===tk)){if(msg)msg.textContent=tk+" is already in your list.";return;}
  var name=(S.addNm||"").trim()||tk;
  var val=parseFloat(S.addVal);if(isNaN(val)||val<0)val=0;
  var palette=["#a3e635","#f87171","#60a5fa","#fbbf24","#34d399","#c084fc","#fb923c","#818cf8","#ea4335","#2dd4bf","#f472b6","#38bdf8"];
  var color=palette[S.holdings.length%palette.length];
  S.holdings.push({ticker:tk,name:name,value:val,basePct:0,target:0,color:color,anchor:!!S.addAnchor,
    tip:"Added by you. Set a target weight later if you want it in the inject planner."});
  S.adding=false;S.addTk="";S.addNm="";S.addVal="";S.addAnchor=false;
  save();loadPrices();render();
}
function copyPlan(){ // #1 planner only — copies suggested split, never mutates holdings
  const{holdings,mode,winner,budget}=S;
  const{dist:id}=getIdxDist(holdings,budget);
  const rd=getRotDist(holdings,winner,budget);
  const ad=mode==="rotation"?rd:id;
  var lines=Object.keys(ad).filter(t=>ad[t]>0).sort((a,b)=>ad[b]-ad[a]).map(t=>t+": $"+ad[t]);
  var txt="Injection plan ("+mode+", $"+budget+"):\n"+lines.join("\n");
  function done(){S.injected=true;render();setTimeout(()=>{S.injected=false;render();},2500);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(done);}
  else{var m=document.getElementById("planMsg");if(m)m.textContent=txt;done();}
}
// auto-load live prices shortly after first paint
setTimeout(loadPrices,500);
render();
</script>
