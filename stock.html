<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Stock — PortfolioOS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:90px;overflow-x:hidden;transition:background 0.5s,color 0.4s;}

/* THEMES */
body{--bg:#f8faff;--surf:#fff;--surf2:#f1f5ff;--text:#0a0f1e;--text2:#475569;--text3:#94a3b8;--border:#e2e8f8;--acc:#4f46e5;--sc:#a3e635;}
.t-tsla{--bg:#fff5f5;--surf:#fff;--surf2:#fef2f2;--sc:#f87171;}
.t-dell{--bg:#eff6ff;--surf:#fff;--surf2:#eef2ff;--sc:#60a5fa;}
.t-ibm{--bg:#f5f3ff;--surf:#fff;--surf2:#ede9fe;--sc:#818cf8;}
.t-sndk{--bg:#fff7ed;--surf:#fff;--surf2:#ffedd5;--sc:#fb923c;}
.t-abbv{--bg:#f0fdf9;--surf:#fff;--surf2:#ecfdf5;--sc:#34d399;}
.t-xom{--bg:#fffbeb;--surf:#fff;--surf2:#fef9c3;--sc:#fbbf24;}
.t-jpm{--bg:#f0f9ff;--surf:#fff;--surf2:#e0f2fe;--sc:#38bdf8;}
.t-nflx{--bg:#fff5f5;--surf:#fff;--surf2:#fef2f2;--sc:#ef4444;}
.t-lcid{--bg:#faf5ff;--surf:#fff;--surf2:#f3e8ff;--sc:#c084fc;}

body{background:var(--bg);color:var(--text);}

/* BG MESH */
.bg-mesh{position:fixed;inset:0;z-index:-1;pointer-events:none;}
.bg-mesh::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 15%,var(--sc,#a3e635)12,transparent 60%),radial-gradient(ellipse 50% 40% at 85% 85%,var(--sc,#a3e635)08,transparent 60%);opacity:0.18;transition:background 0.5s;}
.bg-mesh::after{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--sc,#a3e635)08 1px,transparent 1px),linear-gradient(90deg,var(--sc,#a3e635)08 1px,transparent 1px);background-size:36px 36px;opacity:0.25;}

/* NAV */
nav{position:sticky;top:0;z-index:50;background:rgba(248,250,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.nav-back{font-size:12px;color:var(--text2);cursor:pointer;padding:6px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surf);transition:all 0.2s;white-space:nowrap;}
.nav-back:hover{border-color:var(--sc);color:var(--sc);}
.nav-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;flex:1;text-align:center;color:var(--text);}
.nav-pill{font-family:'DM Mono',monospace;font-size:9px;padding:3px 9px;border-radius:10px;background:var(--sc)22;color:var(--sc);}

/* SWITCHER */
.switcher-wrap{padding:12px 16px 4px;max-width:820px;margin:0 auto;}
.switcher{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
.switcher::-webkit-scrollbar{display:none;}
.sw-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:52px;}
.sw-logo-wrap{width:36px;height:36px;border-radius:10px;overflow:hidden;border:2px solid var(--border);transition:all 0.25s;display:flex;align-items:center;justify-content:center;}
.sw-item.active .sw-logo-wrap{border-width:2.5px;box-shadow:0 4px 14px var(--sc)44;}
.sw-logo-wrap svg{width:100%;height:100%;}
.sw-label{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.5px;transition:color 0.2s;}
.sw-item.active .sw-label{font-weight:700;}

/* HERO */
.hero-wrap{padding:16px 16px 0;max-width:820px;margin:0 auto;}
.hero-card{background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:22px;padding:18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;}
.hero-logo{width:64px;height:64px;border-radius:16px;overflow:hidden;flex-shrink:0;box-shadow:0 8px 24px var(--sc)33;border:1.5px solid var(--sc)33;}
.hero-logo svg{width:100%;height:100%;}
.hero-info{flex:1;}
.hero-ticker{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;line-height:1;color:var(--text);}
.hero-name{font-size:12px;color:var(--text2);margin-top:2px;}
.hero-badges{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.badge{font-size:8px;padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace;}
.hero-price{text-align:right;flex-shrink:0;}
.price-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--text);}
.price-change{font-size:11px;font-weight:600;margin-top:3px;}
.live-pill{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-family:'DM Mono',monospace;color:#16a34a;background:#dcfce7;padding:2px 6px;border-radius:6px;margin-top:4px;}
.timing{display:flex;align-items:center;gap:14px;padding:15px 18px;border-radius:18px;margin-bottom:12px;border:1.5px solid;position:relative;overflow:hidden;animation:fadeIn 0.4s ease;}
.timing-icon{font-size:30px;flex-shrink:0;}
.timing-verdict{font-family:'Playfair Display',serif;font-weight:900;font-size:21px;letter-spacing:-0.3px;line-height:1;}
.timing-reason{font-size:11.5px;line-height:1.5;margin-top:4px;}
.timing-upside{margin-left:auto;text-align:right;flex-shrink:0;}
.timing-upside .u-val{font-family:'Playfair Display',serif;font-weight:900;font-size:24px;line-height:1;}
.timing-upside .u-lbl{font-size:8px;font-family:'DM Mono',monospace;letter-spacing:1px;opacity:0.7;margin-top:2px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#16a34a;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* CARDS */
.wrap{padding:0 16px;max-width:820px;margin:0 auto;}
.card{background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.full{grid-column:1/-1;}
.clabel{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.row-l{font-size:11px;color:var(--text2);}
.row-r{font-size:12px;font-weight:600;font-family:'DM Mono',monospace;}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.metric{padding:8px;background:var(--surf2);border-radius:9px;}
.metric-l{font-size:8px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:2px;}
.metric-v{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);}
.rating-c{width:70px;height:70px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 8px;}
.rating-v{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;}
.rating-l{font-size:7px;font-family:'DM Mono',monospace;letter-spacing:0.5px;}
.analyst-bar{display:flex;height:8px;border-radius:5px;overflow:hidden;margin:8px 0 5px;gap:2px;}
.a-seg{height:100%;border-radius:4px;}
.a-labels{display:flex;justify-content:space-between;font-size:8px;font-family:'DM Mono',monospace;}
.target-track{height:7px;border-radius:4px;background:var(--surf2);position:relative;margin:8px 0;}
.target-fill{height:100%;border-radius:4px;}
.target-dot{width:11px;height:11px;border-radius:50%;border:2px solid #fff;position:absolute;top:-2px;transform:translateX(-50%);}
.eps-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.eps-row:last-child{border-bottom:none;}
.eps-q{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);width:36px;}
.eps-bars{flex:1;display:flex;gap:3px;align-items:flex-end;height:30px;}
.eps-bar{border-radius:3px 3px 0 0;width:13px;}
.news-item{padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.news-item:last-child{border-bottom:none;}
.news-src{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:1px;margin-bottom:3px;}
.news-title{font-size:12px;font-weight:500;line-height:1.5;color:var(--text);}
.news-time{font-size:9px;color:var(--text3);margin-top:2px;}
.s-pill{font-size:7px;padding:1px 5px;border-radius:5px;font-family:'DM Mono',monospace;margin-left:5px;}
.proj-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
.proj-item:last-child{border-bottom:none;}
.proj-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.proj-t{font-size:12px;font-weight:600;color:var(--text);}
.proj-d{font-size:10px;color:var(--text3);margin-top:1px;line-height:1.4;}
.proj-tag{font-size:8px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:6px;margin-top:3px;display:inline-block;}

/* CHART */
.chart-card{background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:12px;}
.chart-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.chart-tabs{display:flex;gap:3px;}
.chart-tab{font-family:'DM Mono',monospace;font-size:9px;padding:4px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.2s;}
.chart-tab.active{color:#fff;border:none;}
.chart-area{height:150px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
.chart-area svg{width:100%;height:150px;}
.loading-bar{width:100px;height:3px;background:var(--surf2);border-radius:2px;overflow:hidden;}
.loading-fill{height:100%;border-radius:2px;animation:load 1.4s ease-in-out infinite;}
@keyframes load{0%{width:0%;margin-left:0;}60%{width:60%;}100%{width:0%;margin-left:100%;}}

/* BOTTOM */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 14px;background:rgba(248,250,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;gap:8px;}
.bb-btn{flex:1;padding:12px;border-radius:14px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all 0.2s;text-align:center;}
.bb-arr{padding:12px 14px;border-radius:14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:var(--surf);color:var(--text2);transition:all 0.2s;}
.bb-arr:hover{border-color:var(--sc);color:var(--sc);}
.bb-arr:disabled{opacity:0.25;cursor:default;}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.3s ease forwards;}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<nav>
  <button class="nav-back" onclick="window.location.href='index.html'">← Back</button>

      <div class="hero-ticker" id="heroTicker">—</div>

    </div>
    <div class="hero-price">

      <div id="livePill"></div>
    </div>
  </div>
</div>

<div class="wrap"><div id="timingBanner"></div></div>

<div class="wrap">
  <div class="chart-card fade-in">

      <div>
        <div style="font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;">PRICE CHART</div>

        <button class="chart-tab" data-r="6mo">6M</button>
        <button class="chart-tab" data-r="1y">1Y</button>
      </div>
    </div>
    <div class="chart-area" id="chartArea">
      <div style="font-size:20px;">📡</div>
      <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;">Fetching live prices...</div>

    </div>
  </div>

  <div class="grid2">
    <div class="card fade-in" id="posCard"><div class="clabel">My Position</div><div id="posRows"></div></div>
    <div class="card fade-in" style="text-align:center;" id="analystCard"><div class="clabel">Analyst Consensus</div><div id="analystContent"></div></div>
    <div class="card fade-in"><div class="clabel">Key Metrics</div><div class="metric-grid" id="metricsGrid"></div></div>
    <div class="card fade-in"><div class="clabel">Dividend</div><div id="divContent"></div></div>
    <div class="card full fade-in"><div class="clabel">Quarterly Earnings — EPS Est. vs Actual</div><div id="epsRows"></div><div style="display:flex;gap:10px;margin-top:8px;"><span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#c7d2f0;margin-right:3px;"></span><span style="font-size:9px;color:var(--text3);">Est</span></span><span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--acc);margin-right:3px;"></span><span style="font-size:9px;color:var(--text3);">Actual</span></span></div></div>
    <div class="card full fade-in"><div class="clabel">Revenue &amp; Free Cash Flow — Last 4 Quarters</div><div id="finChart"></div><div style="display:flex;gap:14px;margin-top:10px;justify-content:center;"><span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:var(--sc);"></span><span style="font-size:9px;color:var(--text3);">Revenue</span></span><span style="display:flex;align-items:center;gap:4px;"><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:var(--sc);opacity:0.4;"></span><span style="font-size:9px;color:var(--text3);">Free Cash Flow</span></span></div></div>
    <div class="card full fade-in"><div class="clabel">Market Sentiment</div><div id="sentiment"></div></div>
    <div class="card full fade-in"><div class="clabel">Company Overview</div><div id="overviewText" style="font-size:12px;color:var(--text2);line-height:1.75;margin-bottom:12px;"></div><div class="clabel" style="margin-top:4px;">Key Projects</div><div id="projList"></div></div>
    <div class="card full fade-in"><div class="clabel">Latest News</div><div id="newsItems"></div></div>
  </div>
</div>

<div class="bottom-bar">
  <button class="bb-arr" id="prevBtn" onclick="navigate(-1)">←</button>
  <button class="bb-btn" style="background:var(--surf2);color:var(--text2);border:1px solid var(--border);" onclick="window.location.href='index.html'">All Stocks</button>
  <button class="bb-btn" id="injectBtn" style="color:#fff;" onclick="window.location.href='app.html'">💉 Inject</button>
  <button class="bb-arr" id="nextBtn" onclick="navigate(1)">→</button>
</div>

function fetchChart(ticker, range, cb) {
  var interval = range === "1y" ? "1wk" : "1d";
  var base = "https://query1.finance.yahoo.com/v8/finance/chart/" + ticker + "?range=" + range + "&interval=" + interval;
  var proxies = [
    "https://corsproxy.io/?" + encodeURIComponent(base),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(base)
  ];
  var idx = 0;
  function tryNext() {
    if (idx >= proxies.length) { cb(null); return; }
    var xhr = new XMLHttpRequest();
    xhr.open("GET", proxies[idx++], true);
    xhr.timeout = 8000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var d = JSON.parse(xhr.responseText);
          var r = d && d.chart && d.chart.result && d.chart.result[0];
          if (r) {
            var cl = r.indicators && r.indicators.quote && r.indicators.quote[0] && r.indicators.quote[0].close || [];
            var ts = r.timestamp || [];
            var pts = [];
            for (var i = 0; i < cl.length; i++) { if (cl[i] != null && ts[i] != null) pts.push({p:cl[i],t:ts[i]}); }
            if (pts.length > 1) { cb(pts); return; }
          }
        } catch(e) {}
      }
      tryNext();
    };
    xhr.onerror = function() { tryNext(); };
    xhr.ontimeout = function() { tryNext(); };
    xhr.send();
  }
  tryNext();
}

  }
  var sign = upside >= 0 ? "+" : "";
  tEl.innerHTML = '<div class="timing" style="background:'+bg+';border-color:'+bd+';color:'+vcol+';">'
    + '<div class="timing-icon">'+icon+'</div>'
    + '<div style="flex:1;min-width:0;"><div class="timing-verdict">'+verdict+'</div>'
    + '<div class="timing-reason" style="color:var(--text2);">'+reason+'</div></div>'
    + '<div class="timing-upside"><div class="u-val">'+sign+upside.toFixed(0)+'%</div><div class="u-lbl">VS TARGET</div></div>'
    + '</div>';
}

function drawChart(pts, color) {
  if (!pts || pts.length < 2) {
    document.getElementById("chartArea").innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="font-size:20px;">📡</div><div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;">Live data unavailable</div><a href="https://finance.yahoo.com/quote/'+currentTicker+'" target="_blank" style="font-size:10px;color:var(--acc);padding:5px 12px;border:1px solid var(--border);border-radius:8px;">View on Yahoo Finance ↗</a></div>';
    document.getElementById("chartInfo").textContent = "Unavailable";
    return;
  }
  var mn = pts[0].p, mx = pts[0].p;
  for (var i = 1; i < pts.length; i++) { if (pts[i].p < mn) mn = pts[i].p; if (pts[i].p > mx) mx = pts[i].p; }
  var rng = mx - mn || 1;
  var W = 400, H = 130, pad = 6, bot = 18;
  var mapped = [];
  for (var i = 0; i < pts.length; i++) {
    mapped.push({x: pad + (i/(pts.length-1))*(W-pad*2), y: pad + (1-((pts[i].p-mn)/rng))*(H-pad-bot), p: pts[i].p, t: pts[i].t});
  }
  var last = mapped[mapped.length-1], first = mapped[0];
  var isUp = last.p >= first.p;
  var lc = isUp ? "#16a34a" : "#dc2626";
  var area = "M" + mapped.map(function(v){return v.x.toFixed(1)+","+v.y.toFixed(1);}).join("L") + "L" + last.x + "," + (H-bot) + " L" + first.x + "," + (H-bot) + " Z";
  var line = "M" + mapped.map(function(v){return v.x.toFixed(1)+","+v.y.toFixed(1);}).join("L");
  var step = Math.max(1, Math.floor(mapped.length/4));
  var xlabels = "";
  for (var i = 0; i < mapped.length; i++) {
    if (i === 0 || i === mapped.length-1 || i % step === 0) {
      var d = new Date(mapped[i].t*1000);
      var lbl = d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      xlabels += '<text x="'+mapped[i].x.toFixed(1)+'" y="'+(H-2)+'" text-anchor="middle" fill="#94a3b8" font-size="7.5" font-family="DM Mono,monospace">'+lbl+'</text>';
    }
  }
  var pct = ((last.p-first.p)/first.p*100).toFixed(2);
  var sign = parseFloat(pct)>=0?"+":"";
  document.getElementById("chartArea").innerHTML = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:150px;" preserveAspectRatio="none">'
    + '<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+lc+'" stop-opacity="0.2"/><stop offset="100%" stop-color="'+lc+'" stop-opacity="0.01"/></linearGradient></defs>'
    + '<path d="'+area+'" fill="url(#cg)"/>'
    + '<path d="'+line+'" fill="none" stroke="'+lc+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    + '<circle cx="'+last.x.toFixed(1)+'" cy="'+last.y.toFixed(1)+'" r="3.5" fill="'+lc+'" stroke="white" stroke-width="1.5"/>'
    + xlabels + '</svg>';
  document.getElementById("chartInfo").innerHTML = '<span style="font-weight:600;">$'+last.p.toFixed(2)+'</span>'
    + '<span style="margin-left:8px;color:'+lc+';font-weight:600;">'+sign+pct+'%</span>'
    + '<span style="margin-left:5px;font-size:9px;color:var(--text3);">this period</span>'
    + '<span style="display:inline-flex;align-items:center;gap:3px;font-size:8px;font-family:DM Mono,monospace;color:#16a34a;background:#dcfce7;padding:2px 6px;border-radius:6px;margin-left:6px;"><span style="width:4px;height:4px;border-radius:50%;background:#16a34a;animation:blink 1.5s infinite;"></span>LIVE</span>';
  document.getElementById("priceVal").textContent = "$" + last.p.toFixed(2);
  document.getElementById("livePill").innerHTML = '<span class="live-pill"><span class="live-dot"></span>Live price</span>';
  // sync analyst-consensus "Current" + slider to the live price
  var curEl = document.getElementById("curLabel");
  if (curEl) curEl.textContent = "Current: $" + last.p.toFixed(2);
  if (window._tRange) {
    var rng = window._tRange;
    var pos = Math.min(Math.max(((last.p - rng.lo) / (rng.hi - rng.lo)) * 100, 2), 98);
    var fillEl = document.getElementById("tFill");
    var dotEl = document.getElementById("tDot");
    if (fillEl) fillEl.style.width = pos.toFixed(0) + "%";
    if (dotEl) dotEl.style.left = pos.toFixed(0) + "%";
  }
  // refresh buy-timing verdict against the live price
  renderTiming(last.p);
}

function loadChart(range) {
  currentRange = range;
  var color = COLORS[currentTicker] || "#6366f1";
  document.getElementById("chartArea").innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="font-size:18px;">📡</div><div style="font-size:10px;color:var(--text3);font-family:DM Mono,monospace;">Fetching live prices...</div><div class="loading-bar"><div class="loading-fill" style="background:'+color+';"></div></div></div>';
  document.getElementById("chartInfo").textContent = "Loading...";
  document.querySelectorAll(".chart-tab").forEach(function(b) {
    var on = b.getAttribute("data-r") === range;
    b.classList.toggle("active", on);
    b.style.background = on ? color : "";
    b.style.color = on ? "#fff" : "";
    b.style.borderColor = on ? color : "";
  });
  fetchChart(currentTicker, range, function(pts) { drawChart(pts, color); });
}

// ── RENDER ────────────────────────────────────────────────
function render(t) {
  currentTicker = t;
  var d = DATA[t];
  var color = COLORS[t] || "#6366f1";
  if (!d) return;

  // Body theme
  document.body.className = THEMES[t] || "";

  // Nav
  document.title = t + " — PortfolioOS";
  document.getElementById("navTitle").textContent = t;
  document.getElementById("navPill").textContent = d.sector;
  document.getElementById("navPill").style.background = color + "22";
  document.getElementById("navPill").style.color = color;

  // Hero
  document.getElementById("heroLogo").innerHTML = LOGOS[t] || "";
  document.getElementById("heroLogo").style.borderColor = color + "44";
  document.getElementById("heroLogo").style.boxShadow = "0 8px 24px " + color + "33";
  document.getElementById("heroTicker").textContent = t;
  document.getElementById("heroName").textContent = d.name;
  document.getElementById("priceVal").textContent = "$" + d.analyst.cur;
  document.getElementById("priceChange").textContent = "";
  document.getElementById("livePill").textContent = "";
  document.getElementById("heroBadges").innerHTML = '<span class="badge" style="background:'+color+'18;color:'+color+';">'+d.sector+'</span>'+(d.anchor?'<span class="badge" style="background:#d1fae5;color:#065f46;">⚓ Anchor</span>':'');
  document.getElementById("injectBtn").style.background = "linear-gradient(135deg,"+color+","+color+"cc)";

  // Prev/Next
  var idx = ORDER.indexOf(t);
  var prevBtn = document.getElementById("prevBtn");
  var nextBtn = document.getElementById("nextBtn");
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === ORDER.length - 1;

  // Position
  var p = d.pos;
  document.getElementById("posRows").innerHTML =
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">'
    + '<div style="font-family:Playfair Display,serif;font-size:20px;font-weight:900;color:var(--text);">'+p.val+'</div>'
    + (p.pct!=="—"?'<div style="font-size:10px;padding:2px 8px;border-radius:8px;background:'+(p.pct.charAt(0)==="+"?"#dcfce7":"#fee2e2")+';color:'+(p.pct.charAt(0)==="+"?"#166534":"#991b1b")+';font-family:DM Mono,monospace;">'+p.pct+'</div>':"")
    + '</div>'
    + [["Shares",p.shares],["Cost basis",p.cost],["Gain / Loss",p.gl],["Monthly",p.mo],["Target",p.tgt]].map(function(r){
      var valColor = r[0]==="Gain / Loss"&&r[1].charAt(0)==="+"?"#16a34a":r[0]==="Gain / Loss"&&r[1].charAt(0)==="-"?"#dc2626":"var(--text)";
      return '<div class="row"><span class="row-l">'+r[0]+'</span><span class="row-r" style="color:'+valColor+';">'+r[1]+'</span></div>';
    }).join("")
    + '<div style="margin-top:10px;padding:8px 10px;background:'+color+'0d;border-radius:10px;border-left:2px solid '+color+';font-size:10px;color:var(--text2);line-height:1.6;">💡 '+d.overview.split(".")[0]+'.</div>';

  // Analyst
  var an = d.analyst, tot = an.buy + an.hold + an.sell;
  var rc = {"STRONG BUY":"#16a34a","BUY":"#22c55e","HOLD":"#f59e0b","SELL":"#ef4444","STRONG SELL":"#dc2626"};
  var rc_col = rc[an.rating] || "#6366f1";
  var tL = parseFloat(an.tLow.replace(/[$,]/g,"")), tH = parseFloat(an.tHigh.replace(/[$,]/g,""));
  var tPos = Math.min(Math.max(((an.cur-tL)/(tH-tL))*100,2),98);
  window._tRange = {lo:tL, hi:tH, color:color};
  document.getElementById("analystContent").innerHTML =
    '<div class="rating-c" style="background:'+rc_col+'15;border:2px solid '+rc_col+'33;">'
    + '<div class="rating-v" style="color:'+rc_col+';">'+an.score+'</div>'
    + '<div class="rating-l" style="color:'+rc_col+';">'+an.rating+'</div></div>'
    + '<div class="analyst-bar"><div class="a-seg" style="width:'+(an.buy/tot*100).toFixed(0)+'%;background:#22c55e;"></div><div class="a-seg" style="width:'+(an.hold/tot*100).toFixed(0)+'%;background:#f59e0b;"></div><div class="a-seg" style="width:'+(an.sell/tot*100).toFixed(0)+'%;background:#ef4444;"></div></div>'
    + '<div class="a-labels"><span style="color:#22c55e;">Buy '+an.buy+'</span><span style="color:#f59e0b;">Hold '+an.hold+'</span><span style="color:#ef4444;">Sell '+an.sell+'</span></div>'
    + '<div style="font-size:9px;color:var(--text2);margin:8px 0 4px;">Target: '+an.tLow+' → <strong style="color:var(--acc);">'+an.tgt+'</strong> → '+an.tHigh+'</div>'
    + '<div class="target-track"><div id="tFill" class="target-fill" style="width:'+tPos.toFixed(0)+'%;background:linear-gradient(90deg,'+color+'66,'+color+');"></div><div id="tDot" class="target-dot" style="left:'+tPos.toFixed(0)+'%;background:'+color+';box-shadow:0 0 6px '+color+'55;"></div></div>'
    + '<div id="curLabel" style="font-size:8px;color:var(--text3);font-family:DM Mono,monospace;">Current: $'+an.cur+'</div>';

  // Buy-timing banner (upside = analyst target vs current price)
  window._tgtNum = parseFloat(an.tgt.replace(/[$,]/g,""));
  window._tgtStr = an.tgt;
  renderTiming(an.cur);

  // Metrics
  document.getElementById("metricsGrid").innerHTML = Object.keys(d.metrics).map(function(k){
    return '<div class="metric"><div class="metric-l">'+k+'</div><div class="metric-v">'+d.metrics[k]+'</div></div>';
  }).join("");

  // Dividend
  var dv = d.div;
  document.getElementById("divContent").innerHTML = dv.yield==="0%"||dv.yield==="0"
    ? '<div style="text-align:center;padding:16px 0;"><div style="font-size:24px;margin-bottom:4px;">—</div><div style="font-size:11px;color:var(--text3);">No dividend</div></div>'
    : '<div style="font-family:Playfair Display,serif;font-size:22px;font-weight:900;color:#d97706;">'+dv.yield+'</div><div style="font-size:10px;color:var(--text3);margin-bottom:8px;">Annual yield</div>'
      + [["Annual payout",dv.annual],["Frequency",dv.freq],["Next date",dv.next]].map(function(r){ return '<div class="row"><span class="row-l">'+r[0]+'</span><span class="row-r">'+r[1]+'</span></div>'; }).join("");

  // EPS
  var maxE = 0.01;
  for (var i = 0; i < d.eps.length; i++) { var v = Math.max(Math.abs(d.eps[i].e), Math.abs(d.eps[i].a)); if (v > maxE) maxE = v; }
  document.getElementById("epsRows").innerHTML = d.eps.map(function(e){
    var eH = Math.max((Math.abs(e.e)/maxE)*28, 3);
    var aH = Math.max((Math.abs(e.a)/maxE)*28, 3);
    return '<div class="eps-row"><div class="eps-q">'+e.q+'</div><div class="eps-bars"><div class="eps-bar" style="height:'+eH+'px;background:#c7d2f0;"></div><div class="eps-bar" style="height:'+aH+'px;background:'+(e.b?"var(--acc)":"#ef4444")+'"></div></div><div style="display:flex;flex-direction:column;align-items:flex-end;min-width:60px;"><span style="font-size:10px;font-family:DM Mono,monospace;color:var(--text2);">$'+e.a+'</span><span style="font-size:7px;padding:1px 5px;border-radius:5px;margin-top:1px;background:'+(e.b?"#dcfce7":"#fee2e2")+';color:'+(e.b?"#166534":"#991b1b")+'">'+(e.b?"BEAT":"MISS")+'</span></div></div>';
  }).join("");

  // Revenue & Free Cash Flow chart
  var fin = FIN[t];
  var finEl = document.getElementById("finChart");
  if (fin && finEl) {
    var allVals = fin.rev.concat(fin.fcf.filter(function(v){return v!=null;}));
    var maxV = Math.max.apply(null, allVals.map(Math.abs)) || 1;
    var hasFcf = fin.fcf.some(function(v){return v!=null;});
    var bars = "";
    for (var i = 0; i < FIN_QTRS.length; i++) {
      var rev = fin.rev[i];
      var fcf = fin.fcf[i];
      var revH = Math.max((Math.abs(rev)/maxV)*84, 4);
      var fcfH = fcf==null ? 0 : Math.max((Math.abs(fcf)/maxV)*84, 4);
      var fcfNeg = fcf!=null && fcf < 0;
      bars += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;">'
        + '<div style="display:flex;align-items:flex-end;gap:3px;height:90px;">'
        + '<div title="Revenue" style="width:16px;height:'+revH+'px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,'+color+','+color+'aa);transition:height 0.6s;"></div>'
        + (hasFcf ? '<div title="Free Cash Flow" style="width:16px;height:'+fcfH+'px;border-radius:4px 4px 0 0;background:'+(fcfNeg?"#ef4444":color)+';opacity:'+(fcfNeg?"0.7":"0.4")+';transition:height 0.6s;"></div>' : '')
        + '</div>'
        + '<div style="font-size:8px;font-family:DM Mono,monospace;color:var(--text3);">'+FIN_QTRS[i]+'</div>'
        + '<div style="font-size:9px;font-weight:700;color:var(--text);">$'+rev+'B</div>'
        + (hasFcf ? '<div style="font-size:7px;color:'+(fcfNeg?"#ef4444":"var(--text3)")+';">FCF '+(fcf==null?"—":(fcf<0?"-$"+Math.abs(fcf):"$"+fcf)+"B")+'</div>' : '')
        + '</div>';
    }
    finEl.innerHTML = '<div style="display:flex;align-items:flex-end;gap:8px;padding-top:4px;">'+bars+'</div>';
  } else if (finEl) {
    finEl.innerHTML = '<div style="font-size:11px;color:var(--text3);text-align:center;padding:16px 0;">Financial data unavailable</div>';
  }

  // Market Sentiment
  var sEl = document.getElementById("sentiment");
  if (fin && sEl) {
    var bull = fin.bull.map(function(x){return '<div style="display:flex;gap:7px;align-items:flex-start;margin-bottom:6px;"><span style="color:#16a34a;font-size:11px;flex-shrink:0;">▲</span><span style="font-size:11px;line-height:1.5;color:var(--text2);">'+x+'</span></div>';}).join("");
    var bear = fin.bear.map(function(x){return '<div style="display:flex;gap:7px;align-items:flex-start;margin-bottom:6px;"><span style="color:#dc2626;font-size:11px;flex-shrink:0;">▼</span><span style="font-size:11px;line-height:1.5;color:var(--text2);">'+x+'</span></div>';}).join("");
    sEl.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:13px;padding:10px 12px;border-radius:11px;background:'+fin.tone+'14;border:1px solid '+fin.tone+'33;">'
        + '<span style="font-size:9px;font-family:DM Mono,monospace;letter-spacing:1px;color:var(--text3);">THE STREET SAYS</span>'
        + '<span style="font-size:13px;font-weight:800;color:'+fin.tone+';margin-left:auto;">'+fin.label+'</span>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">'
        + '<div><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:#16a34a;margin-bottom:8px;">BULL CASE</div>'+bull+'</div>'
        + '<div><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:#dc2626;margin-bottom:8px;">BEAR CASE</div>'+bear+'</div>'
      + '</div>';
  }

  // Overview & Projects
  document.getElementById("overviewText").textContent = d.overview;
  document.getElementById("projList").innerHTML = d.projects.map(function(p){
    return '<div class="proj-item"><div class="proj-icon" style="background:'+p.tc+'15;">'+p.i+'</div><div style="flex:1;"><div class="proj-t">'+p.t+'</div><div class="proj-d">'+p.d+'</div><span class="proj-tag" style="background:'+p.tc+'18;color:'+p.tc+';">'+p.tag+'</span></div></div>';
  }).join("");

  // News
  document.getElementById("newsItems").innerHTML = d.news.map(function(n){
    var sc = n.s==="positive"?"#dcfce7":n.s==="negative"?"#fee2e2":"#f3f4f6";
    var tc = n.s==="positive"?"#166534":n.s==="negative"?"#991b1b":"#6b7280";
    var sl = n.s==="positive"?"▲ Bullish":n.s==="negative"?"▼ Bearish":"● Neutral";
    return '<div class="news-item"><div class="news-src">'+n.src+'<span class="s-pill" style="background:'+sc+';color:'+tc+';">'+sl+'</span></div><div class="news-title">'+n.t+'</div><div class="news-time">'+n.tm+'</div></div>';
  }).join("");

  // Switcher
  var sw = document.getElementById("switcher");
  sw.innerHTML = "";
  ORDER.forEach(function(tk) {
    var item = document.createElement("div");
    item.className = "sw-item" + (tk === t ? " active" : "");
    item.style.setProperty("--sc", COLORS[tk]);
    var wrap = document.createElement("div");
    wrap.className = "sw-logo-wrap";
    wrap.style.borderColor = tk === t ? COLORS[tk] : "";
    wrap.innerHTML = LOGOS[tk] || "";
    var lbl = document.createElement("span");
    lbl.className = "sw-label";
    lbl.textContent = tk;
    lbl.style.color = tk === t ? COLORS[tk] : "var(--text3)";
    item.appendChild(wrap);
    item.appendChild(lbl);
    item.onclick = (function(ticker){ return function(){ switchTo(ticker); }; })(tk);
    sw.appendChild(item);
  });
  setTimeout(function(){
    var active = sw.querySelector(".active");
    if (active) active.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  }, 100);

  history.replaceState(null, "", "stock.html?t=" + t);
  loadChart(currentRange);
}

function switchTo(t) {
  if (t === currentTicker) return;
  render(t);
  window.scrollTo({top:0,behavior:"smooth"});
}

function navigate(dir) {
  var idx = ORDER.indexOf(currentTicker);
  var next = ORDER[idx + dir];
  if (next) switchTo(next);
}

// Chart tab clicks
document.querySelectorAll(".chart-tab").forEach(function(btn){
  btn.addEventListener("click", function(){ loadChart(btn.getAttribute("data-r")); });
});

// Swipe
var startX = 0;
document.addEventListener("touchstart", function(e){ startX = e.touches[0].clientX; }, {passive:true});
document.addEventListener("touchend", function(e){
  var diff = startX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 60) navigate(diff > 0 ? 1 : -1);
}, {passive:true});

// Init
var initT = (new URLSearchParams(window.location.search)).get("t") || "NVDA";
render(DATA[initT] ? initT : "NVDA");
</script>
</body>
</html>
