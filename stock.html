<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock — PortfolioOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8faff;--surf:#ffffff;--surf2:#f1f5ff;--surf3:#e8eeff;
  --text:#0a0f1e;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f8;--border2:#c7d2f0;
  --accent:#4f46e5;--accent2:#6366f1;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px;}
a{text-decoration:none;color:inherit;}

nav{position:sticky;top:0;z-index:50;background:rgba(248,250,255,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;padding:6px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surf);transition:all 0.2s;}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}
.nav-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;flex:1;text-align:center;}
.nav-pill{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:10px;letter-spacing:1px;}

.stock-hero{padding:24px 20px 0;max-width:800px;margin:0 auto;}
.stock-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;}
.stock-logo{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:13px;font-weight:900;color:#fff;flex-shrink:0;}
.stock-ticker{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;line-height:1;}
.stock-fullname{font-size:13px;color:var(--text2);margin-top:3px;}
.stock-badges{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.badge{font-size:9px;padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace;}
.stock-price{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;}
.stock-change{font-size:13px;font-weight:500;margin-top:3px;}

.chart-section{background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:18px;margin:0 20px 14px;max-width:800px;margin-left:auto;margin-right:auto;}
.chart-tabs{display:flex;gap:4px;}
.chart-tab{font-family:'DM Mono',monospace;font-size:10px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.2s;}
.chart-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.chart-loading{height:160px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;font-family:'DM Mono',monospace;}
.chart-canvas{height:160px;position:relative;}
.chart-svg{width:100%;height:100%;}
.chart-error{height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text3);font-size:11px;text-align:center;}

.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px;max-width:800px;margin:0 auto 14px;}
.card{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:16px;}
.card-full{grid-column:1/-1;}
.card-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}

.position-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.position-row:last-child{border-bottom:none;}
.pos-label{font-size:12px;color:var(--text2);}
.pos-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}

.analyst-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;margin:10px 0 6px;gap:2px;}
.analyst-seg{height:100%;border-radius:4px;}
.analyst-labels{display:flex;justify-content:space-between;font-size:9px;font-family:'DM Mono',monospace;}

.earnings-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.earnings-row:last-child{border-bottom:none;}
.earnings-q{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);width:40px;}
.earnings-bars{flex:1;display:flex;gap:4px;align-items:flex-end;height:32px;}
.earnings-bar{border-radius:3px 3px 0 0;width:14px;}

.news-item{padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.news-item:last-child{border-bottom:none;}
.news-source{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:4px;}
.news-title{font-size:13px;font-weight:500;line-height:1.5;color:var(--text);}
.news-time{font-size:10px;color:var(--text3);margin-top:3px;}
.news-sentiment{font-size:8px;padding:2px 6px;border-radius:6px;font-family:'DM Mono',monospace;margin-left:6px;}

.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.metric-item{padding:9px;background:var(--surf2);border-radius:10px;}
.metric-label{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:3px;}
.metric-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;}

.target-track{height:8px;border-radius:4px;background:var(--surf2);position:relative;margin:10px 0;}
.target-dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff;position:absolute;top:-2px;transform:translateX(-50%);}

.rating-circle{width:76px;height:76px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 8px;}
.rating-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;}
.rating-lbl{font-size:7px;font-family:'DM Mono',monospace;letter-spacing:1px;}

.back-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:rgba(248,250,255,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;gap:10px;}
.back-bar-btn{flex:1;padding:13px;border-radius:14px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all 0.2s;}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--surf2) 25%,var(--surf3) 50%,var(--surf2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skel-line{height:12px;border-radius:6px;margin-bottom:8px;}

@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.slide{animation:slideUp 0.35s ease forwards;}
.d1{animation-delay:0.05s;opacity:0;}
.d2{animation-delay:0.1s;opacity:0;}
.d3{animation-delay:0.15s;opacity:0;}
.d4{animation-delay:0.2s;opacity:0;}
.d5{animation-delay:0.25s;opacity:0;}

/* Live price badge */
.live-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-family:'DM Mono',monospace;color:#16a34a;background:#dcfce7;padding:2px 7px;border-radius:8px;margin-left:6px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#16a34a;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>

<nav>

    </div>

<!-- CHART -->

    </div>

      <button class="chart-tab" data-range="3mo">3M</button>
      <button class="chart-tab" data-range="6mo">6M</button>
      <button class="chart-tab" data-range="1y">1Y</button>
    </div>
  </div>
  <div id="chartArea">
    <div class="chart-loading">📡 Fetching live prices...</div>
  </div>
</div>

<!-- CARDS -->
<div class="cards-grid">
  <div class="card slide d2"><div class="card-label">My Position</div><div id="positionRows"><div class="skeleton skel-line"></div><div class="skeleton skel-line"></div><div class="skeleton skel-line"></div></div></div>
  <div class="card slide d2" style="text-align:center;"><div class="card-label">Analyst Consensus</div><div id="analystContent"><div class="skeleton skel-line" style="height:76px;border-radius:50%;width:76px;margin:0 auto 10px;"></div></div></div>
  <div class="card slide d3"><div class="card-label">Key Metrics</div><div class="metrics-grid" id="keyMetrics"><div class="skeleton skel-line" style="height:50px;border-radius:10px;"></div><div class="skeleton skel-line" style="height:50px;border-radius:10px;"></div><div class="skeleton skel-line" style="height:50px;border-radius:10px;"></div><div class="skeleton skel-line" style="height:50px;border-radius:10px;"></div></div></div>
  <div class="card slide d3"><div class="card-label">Dividend</div><div id="divContent"><div class="skeleton skel-line"></div><div class="skeleton skel-line"></div></div></div>
  <div class="card card-full slide d4"><div class="card-label">Quarterly Earnings — EPS (Est. vs Actual)</div><div id="earningsRows"></div><div style="display:flex;gap:10px;margin-top:10px;"><div><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#c7d2f0;margin-right:4px;"></span><span style="font-size:10px;color:var(--text3);">Estimated</span></div><div><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:4px;"></span><span style="font-size:10px;color:var(--text3);">Actual</span></div></div></div>
  <div class="card card-full slide d5"><div class="card-label">Latest News</div><div id="newsItems"><div class="skeleton skel-line"></div><div class="skeleton skel-line"></div><div class="skeleton skel-line"></div></div></div>
</div>

<div class="back-bar">
  <button class="back-bar-btn" style="background:var(--surf2);color:var(--text2);border:1px solid var(--border);" onclick="window.location.href='index.html'">← Back</button>
  <button class="back-bar-btn" style="background:var(--accent);color:#fff;" onclick="window.location.href='app.html'">💉 Go to Inject</button>
</div>

// ── LIVE CHART via Yahoo Finance proxy ───────────────────
// Multiple proxy fallbacks
const PROXIES = [
  "https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/",
  "https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v8/finance/chart/",
  "https://thingproxy.freeboard.io/fetch/https://query1.finance.yahoo.com/v8/finance/chart/",
];
let currentTicker = "";
let currentRange = "1mo";

function getParam(){return new URLSearchParams(window.location.search).get('t')||'NVDA';}

async function fetchChart(ticker, range){
  const interval = range==="1mo"?"1d":range==="3mo"?"1d":range==="6mo"?"1wk":"1wk";
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=${range}&interval=${interval}&corsDomain=finance.yahoo.com`;
  
  for(const proxy of PROXIES){
    try {
      const url = proxy + (proxy.includes("?") ? encodeURIComponent(yahooUrl.split("finance.yahoo.com/v8/finance/chart/")[1].replace(ticker,"")) : "") ;
      // Build proper URL per proxy type
      let fetchUrl;
      if(proxy.includes("corsproxy.io")) fetchUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;
      else if(proxy.includes("allorigins")) fetchUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`;
      else fetchUrl = proxy + ticker + `?range=${range}&interval=${interval}`;
      
      const r = await fetch(fetchUrl, {signal: AbortSignal.timeout(6000)});
      if(!r.ok) continue;
      const data = await r.json();
      const result = data?.chart?.result?.[0];
      if(!result) continue;
      const closes = result.indicators?.quote?.[0]?.close || [];
      const timestamps = result.timestamp || [];
      const points = closes.map((c,i)=>({price:c,ts:timestamps[i]})).filter(p=>p.price!==null&&p.price!==undefined);
      if(points.length > 0) return points;
    } catch(e) {
      console.warn("Proxy failed, trying next:", e.message);
      continue;
    }
  }
  console.warn("All proxies failed");
  return null;
}

function drawChart(points, color, range){
  if(!points||points.length<2){
    document.getElementById('chartArea').innerHTML=`
      <div class="chart-error">
        <div style="font-size:24px;">📡</div>
        <div>Live data unavailable</div>
        <div style="font-size:10px;margin-top:4px;">CORS restriction on this browser</div>
        <button onclick="window.open('https://finance.yahoo.com/quote/${currentTicker}','_blank')" style="margin-top:8px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surf2);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;">View on Yahoo Finance ↗</button>
      </div>`;
    return;
  }

  const mn=Math.min(...points.map(p=>p.price));
  const mx=Math.max(...points.map(p=>p.price));
  const range_val=mx-mn||1;
  const W=400,H=140,pad=8,bottom=20;
  const pts=points.map((p,i)=>{
    const x=pad+(i/(points.length-1))*(W-pad*2);
    const y=pad+(1-((p.price-mn)/range_val))*(H-pad-bottom);
    return{x,y,price:p.price,ts:p.ts};
  });

  const isUp = pts[pts.length-1].price >= pts[0].price;
  const lineColor = isUp ? "#16a34a" : "#dc2626";
  const fillColor = isUp ? "#16a34a" : "#dc2626";

  const area='M'+pts.map(p=>`${p.x},${p.y}`).join('L')+`L${pts[pts.length-1].x},${H-bottom} L${pts[0].x},${H-bottom} Z`;
  const line='M'+pts.map(p=>`${p.x},${p.y}`).join('L');

  // X labels
  const labelStep=Math.max(1,Math.floor(pts.length/4));
  const labels=pts.filter((_,i)=>i===0||i===pts.length-1||i%labelStep===0).map(p=>{
    const d=new Date(p.ts*1000);
    const lbl=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return`<text x="${p.x}" y="${H-2}" text-anchor="middle" fill="#94a3b8" font-size="7.5" font-family="DM Mono,monospace">${lbl}</text>`;
  }).join('');

  // Price labels on right
  const priceLabels=[mn,mn+(mx-mn)/2,mx].map((v,i)=>{
    const y=pad+(1-((v-mn)/range_val))*(H-pad-bottom);
    return`<text x="${W-2}" y="${y+3}" text-anchor="end" fill="#94a3b8" font-size="7.5" font-family="DM Mono,monospace">$${v.toFixed(0)}</text>`;
  }).join('');

  const lastPt=pts[pts.length-1];
  const firstPt=pts[0];
  const pctChange=((lastPt.price-firstPt.price)/firstPt.price*100).toFixed(2);

  document.getElementById('chartArea').innerHTML=`
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:160px;" preserveAspectRatio="none">
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${fillColor}" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="${fillColor}" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#cg)"/>
      <path d="${line}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lastPt.x}" cy="${lastPt.y}" r="3.5" fill="${lineColor}" stroke="white" stroke-width="1.5"/>
      ${labels}
    </svg>`;

  const changeSign = parseFloat(pctChange)>=0?"+":"";
  document.getElementById('chartRange').innerHTML=`
    <span style="font-weight:600;">$${lastPt.price.toFixed(2)}</span>
    <span style="margin-left:8px;color:${parseFloat(pctChange)>=0?"#16a34a":"#dc2626"};font-weight:600;">${changeSign}${pctChange}%</span>
    <span style="margin-left:6px;font-size:10px;color:var(--text3);">this period</span>
    <span class="live-badge"><span class="live-dot"></span>LIVE</span>`;

  // Update price in header too
  document.getElementById('stockPrice').textContent=`$${lastPt.price.toFixed(2)}`;
  document.getElementById('liveBadge').innerHTML=`<span class="live-badge" style="margin-top:4px;"><span class="live-dot"></span>Live price</span>`;
}

async function loadChart(range){
  currentRange=range;
  document.getElementById('chartArea').innerHTML='<div class="chart-loading">📡 Fetching live prices...</div>';
  document.getElementById('chartRange').textContent='Loading...';
  const points = await fetchChart(currentTicker, range);
  const s = STOCKS[currentTicker];
  drawChart(points, s?.color||"#6366f1", range);
}

    <div style="margin-top:10px;padding:9px 12px;background:${s.color}0d;border-radius:10px;border-left:2px solid ${s.color};font-size:11px;color:var(--text2);line-height:1.6;">💡 ${s.tip}</div>`;

  // Analyst

  document.getElementById('analystContent').innerHTML=`

      <div class="rating-lbl" style="color:${rc[an.rating]};">${an.rating}</div>
    </div>
    <div class="analyst-bar">
      <div class="analyst-seg" style="width:${(an.buy/total*100).toFixed(0)}%;background:#22c55e;"></div>
      <div class="analyst-seg" style="width:${(an.hold/total*100).toFixed(0)}%;background:#f59e0b;"></div>
      <div class="analyst-seg" style="width:${(an.sell/total*100).toFixed(0)}%;background:#ef4444;"></div>
    </div>
    <div class="analyst-labels"><span style="color:#22c55e;">Buy ${an.buy}</span><span style="color:#f59e0b;">Hold ${an.hold}</span><span style="color:#ef4444;">Sell ${an.sell}</span></div>

    <div class="target-track">

  const maxEPS=Math.max(...s.earnings.flatMap(e=>[Math.abs(e.est),Math.abs(e.act)]));

        <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);">$${e.act}</span>
        <span style="font-size:8px;padding:1px 6px;border-radius:6px;margin-top:2px;background:${e.beat?'#dcfce7':'#fee2e2'};color:${e.beat?'#166534':'#991b1b'};">${e.beat?'BEAT':'MISS'}</span>
      </div>
    </div>`).join('');

  // News
  document.getElementById('newsItems').innerHTML=s.news.map(n=>`
    <div class="news-item">
      <div class="news-source">${n.source}<span class="news-sentiment" style="background:${n.sentiment==='positive'?'#dcfce7':n.sentiment==='negative'?'#fee2e2':'#f3f4f6'};color:${n.sentiment==='positive'?'#166534':n.sentiment==='negative'?'#991b1b':'#6b7280'};">${n.sentiment==='positive'?'▲ Bullish':n.sentiment==='negative'?'▼ Bearish':'● Neutral'}</span></div>

// ── INIT ─────────────────────────────────────────────────
async function init(){
  const t=getParam();
  currentTicker=t;
  const s=STOCKS[t];
  if(!s){document.body.innerHTML='<div style="padding:40px;text-align:center;font-family:DM Sans,sans-serif;">Stock not found. <a href="index.html">Go back</a></div>';return;}
  renderStatic(t,s);

  // Chart tab listeners
  document.querySelectorAll('.chart-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.chart-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      loadChart(btn.dataset.range);
    });
  });

  // Load chart
  await loadChart('1mo');
}

init();
