<title>Stock — PortfolioOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8faff;--surf:#ffffff;--surf2:#f1f5ff;--surf3:#e8eeff;
  --text:#0a0f1e;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f8;--border2:#c7d2f0;
  --accent:#4f46e5;--accent2:#6366f1;--accent3:#818cf8;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px;}
a{text-decoration:none;color:inherit;}

/* NAV */
nav{position:sticky;top:0;z-index:50;background:rgba(248,250,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;padding:6px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surf);transition:all 0.2s;}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}
.nav-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;flex:1;text-align:center;}
.nav-pill{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:10px;letter-spacing:1px;}

/* HERO STOCK HEADER */
.stock-hero{padding:32px 20px 0;max-width:800px;margin:0 auto;}
.stock-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;}
.stock-logo{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;}
.stock-name{flex:1;}
.stock-ticker{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;line-height:1;}
.stock-fullname{font-size:14px;color:var(--text2);margin-top:3px;}
.stock-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.badge{font-size:9px;padding:3px 9px;border-radius:10px;font-family:'DM Mono',monospace;letter-spacing:0.5px;font-weight:500;}
.stock-price-block{text-align:right;}
.stock-price{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;}
.stock-change{font-size:13px;font-weight:500;margin-top:4px;}

/* CHART AREA */
.chart-section{background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:20px;margin:0 20px 16px;max-width:800px;margin-left:auto;margin-right:auto;}
.chart-tabs{display:flex;gap:4px;margin-bottom:16px;}
.chart-tab{font-family:'DM Mono',monospace;font-size:10px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.2s;}
.chart-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.chart-canvas{height:160px;position:relative;overflow:hidden;}
.chart-svg{width:100%;height:100%;}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px;max-width:800px;margin:0 auto 16px;}
.card{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:16px;}
.card-full{grid-column:1/-1;}
.card-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.card-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;}
.card-sub{font-size:11px;color:var(--text3);margin-top:4px;}

/* MY POSITION */
.position-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.position-row:last-child{border-bottom:none;}
.pos-label{font-size:12px;color:var(--text2);}
.pos-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}

/* ANALYST */
.analyst-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;margin:12px 0 8px;gap:2px;}
.analyst-seg{height:100%;border-radius:4px;transition:width 0.8s ease;}
.analyst-labels{display:flex;justify-content:space-between;font-size:9px;font-family:'DM Mono',monospace;}

/* EARNINGS */
.earnings-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.earnings-row:last-child{border-bottom:none;}
.earnings-q{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);width:40px;}
.earnings-bars{flex:1;display:flex;gap:4px;align-items:flex-end;height:32px;}
.earnings-bar{border-radius:3px 3px 0 0;width:14px;transition:height 0.6s ease;}
.earnings-legend{display:flex;gap:10px;margin-top:10px;}
.earnings-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}

/* NEWS */
.news-item{padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.2s;}
.news-item:last-child{border-bottom:none;}
.news-item:hover .news-title{color:var(--accent);}
.news-source{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:5px;}
.news-title{font-size:13px;font-weight:500;line-height:1.5;color:var(--text);transition:color 0.2s;}
.news-time{font-size:10px;color:var(--text3);margin-top:4px;}
.news-sentiment{display:inline-block;font-size:8px;padding:2px 6px;border-radius:6px;font-family:'DM Mono',monospace;margin-left:6px;}

/* KEY METRICS */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.metric-item{padding:10px;background:var(--surf2);border-radius:10px;}
.metric-label{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:4px;}
.metric-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace;}

/* TARGET PRICE */
.target-track{height:8px;border-radius:4px;background:var(--surf2);position:relative;margin:12px 0;}
.target-fill{height:100%;border-radius:4px;}
.target-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid #fff;box-shadow:0 0 8px var(--accent)66;position:absolute;top:-2px;transform:translateX(-50%);}

/* RATING CIRCLE */
.rating-circle{width:80px;height:80px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 10px;}
.rating-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;}
.rating-lbl{font-size:8px;font-family:'DM Mono',monospace;letter-spacing:1px;}

/* BACK TO PORTFOLIO */
.back-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;background:rgba(248,250,255,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;gap:10px;}
.back-bar-btn{flex:1;padding:13px;border-radius:14px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all 0.2s;}

/* ANIMATIONS */
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.slide{animation:slideUp 0.4s ease forwards;}
.slide-d1{animation-delay:0.05s;opacity:0;}
.slide-d2{animation-delay:0.1s;opacity:0;}
.slide-d3{animation-delay:0.15s;opacity:0;}
.slide-d4{animation-delay:0.2s;opacity:0;}
.slide-d5{animation-delay:0.25s;opacity:0;}
</style>
</head>

<!-- MY POSITION + ANALYST SIDE BY SIDE -->
<div class="cards-grid">

  </div>

  <!-- Key Metrics -->
  <div class="card slide slide-d3">
    <div class="card-label">Key Metrics</div>
    <div class="metrics-grid" id="keyMetrics"></div>
  </div>

  <!-- Dividend -->
  <div class="card slide slide-d3" id="divCard">
    <div class="card-label">Dividend</div>
    <div id="divContent"></div>
  </div>

  <!-- Earnings -->
  <div class="card card-full slide slide-d4">

    <div id="earningsRows"></div>
    <div class="earnings-legend">

      <div><span class="earnings-dot" style="background:var(--accent);"></span><span style="font-size:10px;color:var(--text3);">Actual</span></div>
    </div>
  </div>

  <!-- News -->
  <div class="card card-full slide slide-d5">
    <div class="card-label">Latest News</div>
    <div id="newsItems"></div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="back-bar">
  <button class="back-bar-btn" style="background:var(--surf2);color:var(--text2);border:1px solid var(--border);" onclick="history.back()">← Back to App</button>

</div>

// ── RENDER ────────────────────────────────────────────────
function getParam(){return new URLSearchParams(window.location.search).get('t')||'NVDA';}

function drawChart(points, color){
  const svg=document.getElementById('chartSvg');
  const W=400,H=160,pad=10;
  const mn=Math.min(...points),mx=Math.max(...points),range=mx-mn||1;
  const pts=points.map((v,i)=>{
    const x=pad+(i/(points.length-1))*(W-pad*2);
    const y=H-pad-(((v-mn)/range)*(H-pad*2));
    return[x,y];
  });
  const area='M'+pts.map(p=>p.join(',')).join('L')+`L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;
  const line='M'+pts.map(p=>p.join(',')).join('L');
  svg.innerHTML=`
    <defs>
      <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#cg)"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(([x,y],i)=>i===pts.length-1?`<circle cx="${x}" cy="${y}" r="4" fill="${color}" stroke="white" stroke-width="2"/>`:'').join('')}
    ${[0,1,2,3,4].map(i=>{const x=pad+(i/4)*(W-pad*2);const lbl=points[Math.round(i/4*(points.length-1))];return`<text x="${x}" y="${H-1}" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="DM Mono,monospace">${typeof lbl==='number'&&lbl>100?'$'+Math.round(lbl):'$'+lbl.toFixed(2)}</text>`}).join('')}
  `;
}

function render(){
  const t=getParam();
  const s=STOCKS[t];
  if(!s){document.body.innerHTML='<div style="padding:40px;text-align:center;">Stock not found</div>';return;}

  document.title=`${t} — PortfolioOS`;
  document.getElementById('navTitle').textContent=t;
  document.getElementById('navPill').textContent=s.sector;
  document.getElementById('navPill').style.background=s.color+'22';
  document.getElementById('navPill').style.color=s.color;

  // Logo
  const logo=document.getElementById('stockLogo');
  logo.textContent=t.slice(0,3);
  logo.style.background=`linear-gradient(135deg,${s.color},${s.color}99)`;

  // Header
  document.getElementById('stockTicker').textContent=t;
  document.getElementById('stockFullname').textContent=s.name;
  document.getElementById('stockPrice').textContent=s.price;
  const chEl=document.getElementById('stockChange');
  chEl.textContent=s.change+' today';
  chEl.style.color=s.changePos?'#16a34a':'#dc2626';

  // Badges
  const badges=document.getElementById('stockBadges');
  badges.innerHTML=`
    <span class="badge" style="background:${s.color}18;color:${s.color};">${s.sector}</span>
    ${s.anchor?`<span class="badge" style="background:#d1fae5;color:#065f46;">⚓ Anchor</span>`:''}
    <span class="badge" style="background:${s.changePos?'#dcfce7':'#fee2e2'};color:${s.changePos?'#166534':'#991b1b'};">${s.changePos?'▲':'▼'} ${s.change}</span>
  `;

  // Chart
  document.getElementById('chartHigh').textContent=`52W: ${s.metrics['52W Low']} — ${s.metrics['52W High']}`;
  drawChart(s.chartPoints, s.color);

  // Chart tabs
  document.querySelectorAll('.chart-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.chart-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Position
  const posEl=document.getElementById('positionRows');
  const pos=s.position;
  posEl.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:900;">${pos.value}</div>
      ${pos.gainPct!=='—'?`<div style="font-size:11px;padding:3px 8px;border-radius:8px;background:${pos.gainPct.startsWith('+')?'#dcfce7':'#fee2e2'};color:${pos.gainPct.startsWith('+')?'#166534':'#991b1b'};font-family:'DM Mono',monospace;">${pos.gainPct}</div>`:''}
    </div>
    ${[['Shares owned',pos.shares],['Cost basis',pos.costBasis],['Gain / Loss',pos.gainLoss],['Monthly injection',pos.monthly],['Target allocation',pos.target]].map(([l,v])=>`
      <div class="position-row">
        <span class="pos-label">${l}</span>
        <span class="pos-val" style="color:${l==='Gain / Loss'&&v.startsWith('+')?'#16a34a':l==='Gain / Loss'&&v.startsWith('-')?'#dc2626':'var(--text)'};">${v}</span>
      </div>`).join('')}
    <div style="margin-top:12px;padding:10px;background:${s.color}0d;border-radius:10px;border-left:2px solid ${s.color};font-size:11px;color:var(--text2);line-height:1.6;">
      💡 ${s.tip}
    </div>`;

  // Analyst
  const an=s.analyst;
  const total=an.buy+an.hold+an.sell;
  const ratingColors={'STRONG BUY':'#16a34a','BUY':'#22c55e','HOLD':'#f59e0b','SELL':'#ef4444','STRONG SELL':'#dc2626'};
  const rc=document.getElementById('ratingCircle');
  rc.style.background=ratingColors[an.rating]+'18';
  rc.style.border=`2px solid ${ratingColors[an.rating]}44`;
  document.getElementById('ratingVal').textContent=an.score;
  document.getElementById('ratingVal').style.color=ratingColors[an.rating];
  document.getElementById('ratingLbl').textContent=an.rating;
  document.getElementById('ratingLbl').style.color=ratingColors[an.rating];
  document.getElementById('analystBar').innerHTML=`
    <div class="analyst-seg" style="width:${(an.buy/total*100).toFixed(0)}%;background:#22c55e;"></div>
    <div class="analyst-seg" style="width:${(an.hold/total*100).toFixed(0)}%;background:#f59e0b;"></div>
    <div class="analyst-seg" style="width:${(an.sell/total*100).toFixed(0)}%;background:#ef4444;"></div>
  `;
  document.getElementById('analystLabels').innerHTML=`
    <span style="color:#22c55e;">Buy ${an.buy}</span>
    <span style="color:#f59e0b;">Hold ${an.hold}</span>
    <span style="color:#ef4444;">Sell ${an.sell}</span>
  `;
  const tLow=parseFloat(an.targetLow.replace(/[$,]/g,''));
  const tHigh=parseFloat(an.targetHigh.replace(/[$,]/g,''));
  const tCur=an.current;
  const tPos=Math.min(Math.max(((tCur-tLow)/(tHigh-tLow))*100,0),100);
  document.getElementById('priceTarget').innerHTML=`
    <div style="font-size:10px;margin-bottom:6px;">Target: ${an.targetLow} — <strong style="color:var(--accent);">${an.target}</strong> — ${an.targetHigh}</div>
    <div class="target-track">
      <div class="target-fill" style="width:${tPos.toFixed(0)}%;background:linear-gradient(90deg,${s.color}66,${s.color});"></div>
      <div class="target-dot" style="left:${tPos.toFixed(0)}%;background:${s.color};box-shadow:0 0 8px ${s.color}66;"></div>
    </div>
    <div style="font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:4px;">Current: ${s.price}</div>
  `;

  // Key metrics
  const km=document.getElementById('keyMetrics');
  km.innerHTML=Object.entries(s.metrics).map(([k,v])=>`
    <div class="metric-item">
      <div class="metric-label">${k}</div>
      <div class="metric-val">${v}</div>
    </div>`).join('');

  // Dividend
  const dc=document.getElementById('divContent');
  const dv=s.dividend;
  if(dv.yield==='0%'||dv.yield==='0'){
    dc.innerHTML=`<div style="text-align:center;padding:20px 0;"><div style="font-size:32px;margin-bottom:8px;">—</div><div style="font-size:12px;color:var(--text3);">No dividend</div></div>`;
  } else {
    dc.innerHTML=`
      <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:#d97706;margin-bottom:4px;">${dv.yield}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px;">Annual yield</div>
      ${[['Annual payout',dv.annual],['Frequency',dv.frequency],['Next date',dv.nextDate]].map(([l,v])=>`
        <div class="position-row"><span class="pos-label">${l}</span><span class="pos-val">${v}</span></div>`).join('')}
    `;
  }

  // Earnings
  const er=document.getElementById('earningsRows');
  const maxEPS=Math.max(...s.earnings.flatMap(e=>[Math.abs(e.est),Math.abs(e.act)]));
  er.innerHTML=s.earnings.map(e=>{
    const estH=Math.max((Math.abs(e.est)/maxEPS)*28,3);
    const actH=Math.max((Math.abs(e.act)/maxEPS)*28,3);
    return`
    <div class="earnings-row">
      <div class="earnings-q">${e.q}</div>
      <div class="earnings-bars">
        <div class="earnings-bar" style="height:${estH}px;background:#c7d2f0;" title="Est: $${e.est}"></div>
        <div class="earnings-bar" style="height:${actH}px;background:${e.beat?'var(--accent)':'#ef4444'};" title="Act: $${e.act}"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;min-width:60px;">
        <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);">$${e.act}</span>
        <span style="font-size:9px;padding:1px 6px;border-radius:6px;margin-top:2px;background:${e.beat?'#dcfce7':'#fee2e2'};color:${e.beat?'#166534':'#991b1b'};">${e.beat?'BEAT':'MISS'}</span>
      </div>
    </div>`;
  }).join('');

  // News
  const ni=document.getElementById('newsItems');
  ni.innerHTML=s.news.map(n=>`
    <div class="news-item">
      <div class="news-source">${n.source}
        <span class="news-sentiment" style="background:${n.sentiment==='positive'?'#dcfce7':n.sentiment==='negative'?'#fee2e2':'#f3f4f6'};color:${n.sentiment==='positive'?'#166534':n.sentiment==='negative'?'#991b1b':'#6b7280'};">
          ${n.sentiment==='positive'?'▲ Bullish':n.sentiment==='negative'?'▼ Bearish':'● Neutral'}
        </span>
      </div>
      <div class="news-title">${n.title}</div>
      <div class="news-time">${n.time}</div>
    </div>`).join('');
}

render();
</script>
