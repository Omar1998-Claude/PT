<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock — PortfolioOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8faff;--surf:#fff;--surf2:#f1f5ff;--surf3:#e8eeff;
  --text:#0a0f1e;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f8;--border2:#c7d2f0;
  --accent:#4f46e5;--accent2:#6366f1;
  --theme-from:#f8faff;--theme-to:#f0f4ff;--theme-mesh1:rgba(99,102,241,0.06);--theme-mesh2:rgba(139,92,246,0.04);
}
body{
  background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;padding-bottom:100px;overflow-x:hidden;
  transition:background 0.6s ease, color 0.4s ease;
}
.page-bg{
  position:fixed;inset:0;z-index:-1;
  background:linear-gradient(160deg,var(--theme-from) 0%,var(--theme-to) 100%);
  transition:background 0.6s ease;
}
.page-bg::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 50% at 20% 20%, var(--theme-mesh1) 0%, transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 80%, var(--theme-mesh2) 0%, transparent 60%);
  transition:background 0.6s ease;
}
.page-bg::after{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle, var(--theme-dots, rgba(0,0,0,0.03)) 1px, transparent 1px);
  background-size:28px 28px;
  opacity:0.6;
}
/* Noise texture overlay */
.noise{position:fixed;inset:0;z-index:-1;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events:none;
}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:50;background:rgba(248,250,255,0.96);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.nav-back{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;padding:6px 11px;border-radius:10px;border:1px solid var(--border);background:var(--surf);transition:all 0.2s;white-space:nowrap;}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}
.nav-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;flex:1;text-align:center;}
.nav-pill{font-family:'DM Mono',monospace;font-size:9px;padding:3px 9px;border-radius:10px;white-space:nowrap;}

/* ── STOCK SWITCHER ── */
.switcher-wrap{padding:12px 16px 0;max-width:820px;margin:0 auto;}
.switcher{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
.switcher::-webkit-scrollbar{display:none;}
.sw-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border-radius:14px;border:1.5px solid var(--border);background:var(--surf);cursor:pointer;transition:all 0.25s;min-width:54px;}
.sw-btn.active{border-color:var(--sw-color);background:var(--sw-color);box-shadow:0 4px 16px var(--sw-color)44;}
.sw-logo{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff;font-family:'Playfair Display',serif;overflow:hidden;position:relative;}
.sw-logo img{width:100%;height:100%;object-fit:contain;border-radius:8px;}
.sw-ticker{font-size:8px;font-weight:700;font-family:'DM Mono',monospace;transition:color 0.2s;}
.sw-btn.active .sw-ticker{color:#fff;}
.sw-btn:not(.active) .sw-ticker{color:var(--text3);}

/* ── STOCK HERO ── */
.stock-hero{padding:20px 16px 0;max-width:820px;margin:0 auto;}
.hero-card{background:var(--surf);border:1px solid var(--border);border-radius:24px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero-bg-orb{position:absolute;width:200px;height:200px;border-radius:50%;filter:blur(60px);opacity:0.08;top:-40px;right:-40px;pointer-events:none;}
.stock-top{display:flex;align-items:flex-start;gap:14px;}
.big-logo{width:64px;height:64px;border-radius:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.12);}
.big-logo img{width:100%;height:100%;object-fit:contain;padding:6px;}
.big-logo-fallback{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:#fff;}
.stock-info{flex:1;min-width:0;}
.stock-ticker{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;line-height:1;}
.stock-name{font-size:12px;color:var(--text2);margin-top:2px;}
.stock-badges{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.badge{font-size:8px;padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace;font-weight:500;}
.price-block{text-align:right;flex-shrink:0;}
.stock-price{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;line-height:1;}
.stock-change{font-size:12px;font-weight:600;margin-top:4px;display:flex;align-items:center;justify-content:flex-end;gap:4px;}
.change-pill{padding:2px 8px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;}
.live-badge{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:6px;margin-top:4px;}
.live-dot{width:5px;height:5px;border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* ── CHART ── */
.chart-section{background:var(--surf);border:1px solid var(--border);border-radius:20px;padding:16px;margin:0 16px 14px;max-width:820px;margin-left:auto;margin-right:auto;}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.chart-tabs{display:flex;gap:3px;}
.chart-tab{font-family:'DM Mono',monospace;font-size:9px;padding:4px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all 0.2s;}
.chart-tab.active{color:#fff;border:none;}
.chart-area{height:160px;position:relative;}
.chart-loading{height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);}
.loading-bar{width:120px;height:3px;background:var(--surf2);border-radius:2px;overflow:hidden;}
.loading-fill{height:100%;border-radius:2px;animation:load 1.5s ease-in-out infinite;}
@keyframes load{0%{width:0%;margin-left:0;}50%{width:60%;}100%{width:0%;margin-left:100%;}}

/* ── GRID ── */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;max-width:820px;margin:0 auto 14px;}
.card{background:var(--surf);border:1px solid var(--border);border-radius:18px;padding:15px;transition:all 0.2s;}
.card-full{grid-column:1/-1;}
.card-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.position-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.position-row:last-child{border-bottom:none;}
.pos-label{font-size:11px;color:var(--text2);}
.pos-val{font-size:12px;font-weight:600;font-family:'DM Mono',monospace;}
.analyst-bar{display:flex;height:8px;border-radius:5px;overflow:hidden;margin:8px 0 5px;gap:2px;}
.analyst-seg{height:100%;border-radius:4px;}
.earnings-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.earnings-row:last-child{border-bottom:none;}
.earnings-q{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);width:36px;}
.earnings-bars{flex:1;display:flex;gap:3px;align-items:flex-end;height:30px;}
.earnings-bar{border-radius:3px 3px 0 0;width:13px;}
.news-item{padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.2s;}
.news-item:last-child{border-bottom:none;}
.news-item:hover .news-title{color:var(--accent);}
.news-source{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:1px;margin-bottom:4px;}
.news-title{font-size:12px;font-weight:500;line-height:1.5;transition:color 0.2s;}
.news-time{font-size:9px;color:var(--text3);margin-top:2px;}
.sentiment-pill{font-size:7px;padding:1px 5px;border-radius:5px;font-family:'DM Mono',monospace;margin-left:5px;}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.metric-item{padding:8px;background:var(--surf2);border-radius:9px;}
.metric-label{font-size:8px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:2px;}
.metric-val{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}
.rating-circle{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 8px;transition:all 0.3s;}
.rating-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;}
.rating-lbl{font-size:7px;font-family:'DM Mono',monospace;letter-spacing:0.5px;}
.target-track{height:7px;border-radius:4px;background:var(--surf2);position:relative;margin:8px 0;}
.target-dot{width:11px;height:11px;border-radius:50%;border:2px solid #fff;position:absolute;top:-2px;transform:translateX(-50%);}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;background:rgba(248,250,255,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;}
.bottom-btn{flex:1;padding:12px;border-radius:14px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all 0.25s;text-align:center;}
.prev-btn,.next-btn{flex:0;padding:12px 14px;border-radius:14px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--border);background:var(--surf);transition:all 0.2s;color:var(--text2);}
.prev-btn:hover,.next-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,var(--surf2) 25%,var(--surf3) 50%,var(--surf2) 75%);background-size:200% 100%;animation:sk 1.5s infinite;border-radius:8px;}
@keyframes sk{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeIn 0.35s ease forwards;}
@keyframes slideLeft{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes slideRight{from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
.slide-left{animation:slideLeft 0.3s ease forwards;}
.slide-right{animation:slideRight 0.3s ease forwards;}

/* ── CHART ERROR ── */
.chart-error{height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;}
</style>
</head>

    <div class="loading-bar"><div class="loading-fill" id="loadingFill" style="background:#6366f1;"></div></div>
  </div>
</div>

<!-- CARDS -->
<div class="cards-grid">
  <div class="card fade" id="posCard"><div class="card-label">My Position</div><div id="positionRows"><div class="skeleton" style="height:12px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;"></div></div></div>
  <div class="card fade" id="analystCard" style="text-align:center;"><div class="card-label">Analyst Consensus</div><div id="analystContent"><div class="skeleton" style="width:72px;height:72px;border-radius:50%;margin:0 auto 10px;"></div><div class="skeleton" style="height:10px;margin-bottom:6px;"></div><div class="skeleton" style="height:8px;"></div></div></div>
  <div class="card fade"><div class="card-label">Key Metrics</div><div class="metrics-grid" id="keyMetrics"><div class="skeleton" style="height:48px;border-radius:9px;"></div><div class="skeleton" style="height:48px;border-radius:9px;"></div><div class="skeleton" style="height:48px;border-radius:9px;"></div><div class="skeleton" style="height:48px;border-radius:9px;"></div></div></div>
  <div class="card fade"><div class="card-label">Dividend</div><div id="divContent"><div class="skeleton" style="height:12px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;"></div></div></div>
  <div class="card card-full fade"><div class="card-label">Quarterly Earnings — EPS Est. vs Actual</div><div id="earningsRows"></div><div style="display:flex;gap:10px;margin-top:10px;"><span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#c7d2f0;margin-right:3px;"></span><span style="font-size:9px;color:var(--text3);">Estimated</span></span><span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:3px;"></span><span style="font-size:9px;color:var(--text3);">Actual</span></span></div></div>
  <div class="card card-full fade"><div class="card-label">Latest News</div><div id="newsItems"><div class="skeleton" style="height:12px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;"></div></div></div>
</div>

<div class="bottom-nav">
  <button class="prev-btn" id="prevBtn" onclick="navigate(-1)">←</button>
  <button class="bottom-btn" style="background:var(--surf2);color:var(--text2);border:1px solid var(--border);" onclick="window.location.href='index.html'">All Stocks</button>
  <button class="bottom-btn" id="injectBtn" style="color:#fff;">💉 Inject</button>
  <button class="next-btn" id="nextBtn" onclick="navigate(1)">→</button>
</div>

// ── CHART ─────────────────────────────────────────────────
let currentTicker="",currentRange="1mo",slideDir="left";

async function fetchChart(ticker,range){
  const interval=range==="1y"?"1wk":"1d";
  const yahooUrl="https://query1.finance.yahoo.com/v8/finance/chart/"+ticker+"?range="+range+"&interval="+interval+"&corsDomain=finance.yahoo.com";
  const proxies=[
    "https://corsproxy.io/?"+encodeURIComponent(yahooUrl),
    "https://api.allorigins.win/raw?url="+encodeURIComponent(yahooUrl),
    "https://cors-anywhere.herokuapp.com/"+yahooUrl,
  ];
  for(var i=0;i<proxies.length;i++){
    try{
      var controller=new AbortController();
      var tid=setTimeout(function(){controller.abort();},7000);
      var r=await fetch(proxies[i],{signal:controller.signal,headers:{"X-Requested-With":"XMLHttpRequest"}});
      clearTimeout(tid);
      if(!r.ok)continue;
      var data=await r.json();
      var res=data&&data.chart&&data.chart.result&&data.chart.result[0];
      if(!res)continue;
      var closes=(res.indicators&&res.indicators.quote&&res.indicators.quote[0]&&res.indicators.quote[0].close)||[];
      var timestamps=res.timestamp||[];
      var pts=[];
      for(var j=0;j<closes.length;j++){
        if(closes[j]!=null&&timestamps[j]!=null)pts.push({price:closes[j],ts:timestamps[j]});
      }
      if(pts.length>1)return pts;
    }catch(e){continue;}
  }
  return null;
}

function drawChart(pts,color){
  if(!pts||pts.length<2){
    document.getElementById('chartArea').innerHTML=`
      <div class="chart-error">
        <div style="font-size:22px;">📡</div>
        <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;">Live data unavailable</div>
        <a href="https://finance.yahoo.com/quote/${currentTicker}" target="_blank" style="margin-top:8px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surf2);font-size:11px;color:var(--accent);font-family:'DM Sans',sans-serif;">View on Yahoo Finance ↗</a>
      </div>`;
    return;
  }
  const mn=Math.min(...pts.map(p=>p.price)),mx=Math.max(...pts.map(p=>p.price)),rng=mx-mn||1;
  const W=400,H=140,pad=6,bot=18;
  const mapped=pts.map((p,i)=>({x:pad+(i/(pts.length-1))*(W-pad*2),y:pad+(1-((p.price-mn)/rng))*(H-pad-bot),price:p.price,ts:p.ts}));
  const isUp=mapped[mapped.length-1].price>=mapped[0].price;
  const lc=isUp?"#16a34a":"#dc2626";
  const area='M'+mapped.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('L')+`L${mapped[mapped.length-1].x},${H-bot} L${mapped[0].x},${H-bot} Z`;
  const line='M'+mapped.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('L');
  const step=Math.max(1,Math.floor(mapped.length/4));
  const xLabels=mapped.filter((_,i)=>i===0||i===mapped.length-1||i%step===0).map(p=>{
    const d=new Date(p.ts*1000);
    return`<text x="${p.x.toFixed(1)}" y="${H-2}" text-anchor="middle" fill="#94a3b8" font-size="7.5" font-family="DM Mono,monospace">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</text>`;
  }).join('');
  const last=mapped[mapped.length-1],first=mapped[0];
  const pctChange=((last.price-first.price)/first.price*100).toFixed(2);
  const sign=parseFloat(pctChange)>=0?"+":"";
  document.getElementById('chartArea').innerHTML=`
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:160px;" preserveAspectRatio="none">
      <defs><linearGradient id="cg${currentTicker}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${lc}" stop-opacity="0.22"/><stop offset="100%" stop-color="${lc}" stop-opacity="0.01"/></linearGradient></defs>
      <path d="${area}" fill="url(#cg${currentTicker})"/>
      <path d="${line}" fill="none" stroke="${lc}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3.5" fill="${lc}" stroke="white" stroke-width="1.5"/>
      ${xLabels}
    </svg>`;
  document.getElementById('chartInfo').innerHTML=`<span style="font-weight:600;">$${last.price.toFixed(2)}</span><span style="margin-left:8px;color:${isUp?"#16a34a":"#dc2626"};font-weight:600;">${sign}${pctChange}%</span><span style="margin-left:5px;font-size:9px;color:var(--text3);">this period</span><span style="display:inline-flex;align-items:center;gap:3px;font-size:8px;font-family:'DM Mono',monospace;color:#16a34a;background:#dcfce7;padding:2px 6px;border-radius:6px;margin-left:6px;"><span style="width:4px;height:4px;border-radius:50%;background:#16a34a;animation:blink 1.5s infinite;"></span>LIVE</span>`;
  // Update header price
  document.getElementById('stockPrice').textContent=`$${last.price.toFixed(2)}`;
  document.getElementById('liveBadge').innerHTML=`<span style="display:inline-flex;align-items:center;gap:3px;font-size:8px;font-family:'DM Mono',monospace;color:#16a34a;background:#dcfce7;padding:2px 6px;border-radius:6px;margin-top:4px;"><span style="width:4px;height:4px;border-radius:50%;background:#16a34a;animation:blink 1.5s infinite;"></span>Live price</span>`;
}

async function loadChart(range){
  currentRange=range;
  const s=STOCKS[currentTicker];
  document.getElementById('chartArea').innerHTML=`<div class="chart-loading"><div style="font-size:18px;">📡</div><div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);">Fetching live data...</div><div class="loading-bar"><div class="loading-fill" style="background:${s.color};"></div></div></div>`;
  document.getElementById('chartInfo').textContent='Loading...';
  // Update tab colors
  document.querySelectorAll('.chart-tab').forEach(b=>{
    b.classList.toggle('active',b.dataset.range===range);
    if(b.classList.contains('active'))b.style.background=s.color;
    else b.style.background='';
  });
  const pts=await fetchChart(currentTicker,range);
  drawChart(pts,s.color);
}

function buildSwitcher(activeTicker){
  const sw=document.getElementById('switcher');
  sw.innerHTML=TICKER_ORDER.map(t=>{
    const s=STOCKS[t];
    const isActive=t===activeTicker;
    return`<button class="sw-btn${isActive?' active':''}" style="--sw-color:${s.color};" onclick="switchTo('${t}')">
      <div class="sw-logo" style="background:${isActive?'rgba(255,255,255,0.25)':s.color+'22'};">
        <img src="${LOGOS[t]}" onerror="this.style.display='none';this.nextSibling.style.display='flex';" style="width:100%;height:100%;object-fit:contain;border-radius:8px;"/>
        <span style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:7px;font-weight:900;color:${isActive?'#fff':s.color};font-family:'Playfair Display',serif;">${t.slice(0,3)}</span>
      </div>
      <span class="sw-ticker">${t}</span>
    </button>`;
  }).join('');
  // Scroll active into view
  setTimeout(()=>{
    const active=sw.querySelector('.active');
    if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },100);
}

  // Nav arrows
  const idx=TICKER_ORDER.indexOf(t);
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('prevBtn').style.opacity=idx===0?'0.3':'1';
  document.getElementById('nextBtn').disabled=idx===TICKER_ORDER.length-1;
  document.getElementById('nextBtn').style.opacity=idx===TICKER_ORDER.length-1?'0.3':'1';
  // Position
  const pos=s.position;
  document.getElementById('positionRows').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:900;">${pos.value}</div>
      ${pos.gainPct!=='—'?`<div style="font-size:10px;padding:2px 8px;border-radius:8px;background:${pos.gainPct.startsWith('+')?'#dcfce7':'#fee2e2'};color:${pos.gainPct.startsWith('+')?'#166534':'#991b1b'};font-family:'DM Mono',monospace;">${pos.gainPct}</div>`:''}
    </div>
    ${[['Shares',pos.shares],['Cost basis',pos.costBasis],['Gain / Loss',pos.gainLoss],['Monthly',pos.monthly],['Target',pos.target]].map(([l,v])=>`<div class="position-row"><span class="pos-label">${l}</span><span class="pos-val" style="color:${l==='Gain / Loss'&&v.startsWith('+')?'#16a34a':l==='Gain / Loss'&&v.startsWith('-')?'#dc2626':'var(--text)'};">${v}</span></div>`).join('')}
    <div style="margin-top:10px;padding:8px 10px;background:${s.color}0d;border-radius:10px;border-left:2px solid ${s.color};font-size:10px;color:var(--text2);line-height:1.6;">💡 ${s.tip}</div>`;
  // Analyst
  const an=s.analyst,tot=an.buy+an.hold+an.sell;
  const rc={'STRONG BUY':'#16a34a','BUY':'#22c55e','HOLD':'#f59e0b','SELL':'#ef4444','STRONG SELL':'#dc2626'};
  const tL=parseFloat(an.targetLow.replace(/[$,]/g,'')),tH=parseFloat(an.targetHigh.replace(/[$,]/g,''));
  const tPos=Math.min(Math.max(((an.current-tL)/(tH-tL))*100,2),98);
  document.getElementById('analystContent').innerHTML=`
    <div class="rating-circle" style="background:${rc[an.rating]}15;border:2px solid ${rc[an.rating]}33;">
      <div class="rating-val" style="color:${rc[an.rating]};">${an.score}</div>
      <div class="rating-lbl" style="color:${rc[an.rating]};">${an.rating}</div>
    </div>
    <div class="analyst-bar">
      <div class="analyst-seg" style="width:${(an.buy/tot*100).toFixed(0)}%;background:#22c55e;"></div>
      <div class="analyst-seg" style="width:${(an.hold/tot*100).toFixed(0)}%;background:#f59e0b;"></div>
      <div class="analyst-seg" style="width:${(an.sell/tot*100).toFixed(0)}%;background:#ef4444;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:8px;font-family:'DM Mono',monospace;margin-bottom:10px;">
      <span style="color:#22c55e;">Buy ${an.buy}</span><span style="color:#f59e0b;">Hold ${an.hold}</span><span style="color:#ef4444;">Sell ${an.sell}</span>
    </div>
    <div style="font-size:9px;color:var(--text2);margin-bottom:6px;">Target: ${an.targetLow} → <strong style="color:var(--accent);">${an.target}</strong> → ${an.targetHigh}</div>
    <div class="target-track">
      <div style="height:100%;border-radius:4px;width:${tPos.toFixed(0)}%;background:linear-gradient(90deg,${s.color}66,${s.color});"></div>
      <div class="target-dot" style="left:${tPos.toFixed(0)}%;background:${s.color};box-shadow:0 0 6px ${s.color}55;"></div>
    </div>
    <div style="font-size:8px;color:var(--text3);font-family:'DM Mono',monospace;">Current: $${an.current}</div>`;
  // Metrics
  document.getElementById('keyMetrics').innerHTML=Object.entries(s.metrics).map(([k,v])=>`<div class="metric-item"><div class="metric-label">${k}</div><div class="metric-val">${v}</div></div>`).join('');
  // Dividend
  const dv=s.dividend;
  document.getElementById('divContent').innerHTML=dv.yield==='0%'||dv.yield==='0'
    ?`<div style="text-align:center;padding:16px 0;"><div style="font-size:26px;margin-bottom:4px;">—</div><div style="font-size:11px;color:var(--text3);">No dividend</div></div>`
    :`<div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#d97706;">${dv.yield}</div><div style="font-size:10px;color:var(--text3);margin-bottom:8px;">Annual yield</div>${[['Annual payout',dv.annual],['Frequency',dv.frequency],['Next date',dv.nextDate]].map(([l,v])=>`<div class="position-row"><span class="pos-label">${l}</span><span class="pos-val">${v}</span></div>`).join('')}`;
  // Earnings
  const maxE=Math.max(...s.earnings.flatMap(e=>[Math.abs(e.est),Math.abs(e.act)]));
  document.getElementById('earningsRows').innerHTML=s.earnings.map(e=>`
    <div class="earnings-row">
      <div class="earnings-q">${e.q}</div>
      <div class="earnings-bars">
        <div class="earnings-bar" style="height:${Math.max((Math.abs(e.est)/maxE)*28,3)}px;background:#c7d2f0;"></div>
        <div class="earnings-bar" style="height:${Math.max((Math.abs(e.act)/maxE)*28,3)}px;background:${e.beat?'var(--accent)':'#ef4444'};"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;min-width:60px;">
        <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);">$${e.act}</span>
        <span style="font-size:7px;padding:1px 5px;border-radius:5px;margin-top:1px;background:${e.beat?'#dcfce7':'#fee2e2'};color:${e.beat?'#166534':'#991b1b'};">${e.beat?'BEAT':'MISS'}</span>
      </div>
    </div>`).join('');
  // News
  document.getElementById('newsItems').innerHTML=s.news.map(n=>`
    <div class="news-item">
      <div class="news-source">${n.source}<span class="sentiment-pill" style="background:${n.sentiment==='positive'?'#dcfce7':n.sentiment==='negative'?'#fee2e2':'#f3f4f6'};color:${n.sentiment==='positive'?'#166534':n.sentiment==='negative'?'#991b1b':'#6b7280'};">${n.sentiment==='positive'?'▲ Bullish':n.sentiment==='negative'?'▼ Bearish':'● Neutral'}</span></div>
      <div class="news-title">${n.title}</div>
      <div class="news-time">${n.time}</div>
    </div>`).join('');
}

// ── NAVIGATION ────────────────────────────────────────────
function navigate(dir){
  const idx=TICKER_ORDER.indexOf(currentTicker);
  const next=TICKER_ORDER[idx+dir];
  if(next) switchTo(next, dir>0?'left':'right');
}

function switchTo(t, dir='left'){
  if(t===currentTicker)return;
  slideDir=dir;
  const s=STOCKS[t];
  if(!s)return;
  // Animate out
  const hero=document.getElementById('heroCard');
  hero.style.animation='none';
  hero.style.opacity='0';
  hero.style.transform=`translateX(${dir==='left'?'-30px':'30px'})`;
  setTimeout(()=>{
    renderStatic(t,s,dir);
    hero.style.transition='opacity 0.25s ease, transform 0.25s ease';
    hero.style.opacity='1';
    hero.style.transform='translateX(0)';
    window.scrollTo({top:0,behavior:'smooth'});
    loadChart(currentRange);
    // Update URL
    history.replaceState(null,'',`stock.html?t=${t}`);
  },120);
}

// ── INIT ─────────────────────────────────────────────────
function init(){
  const t=new URLSearchParams(window.location.search).get('t')||'NVDA';
  const s=STOCKS[t];
  if(!s){document.body.innerHTML='<div style="padding:40px;text-align:center;font-family:DM Sans,sans-serif;color:#475569;">Stock not found. <a href="index.html" style="color:#4f46e5;">Go back →</a></div>';return;}
  renderStatic(t,s);
  // Chart tabs
  document.querySelectorAll('.chart-tab').forEach(btn=>{
    btn.addEventListener('click',()=>loadChart(btn.dataset.range));
  });
  // Swipe support
  let startX=0;
  document.addEventListener('touchstart',e=>startX=e.touches[0].clientX,{passive:true});
  document.addEventListener('touchend',e=>{
    const diff=startX-e.changedTouches[0].clientX;
    if(Math.abs(diff)>60)navigate(diff>0?1:-1);
  },{passive:true});
  loadChart('1mo');
}

init();
</script>
</body>
</html>
